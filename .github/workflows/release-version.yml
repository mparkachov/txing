name: Release Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Plan patch release
        id: release
        run: |
          python3 scripts/release_version.py \
            --repo "$GITHUB_WORKSPACE" \
            --event "$GITHUB_EVENT_PATH" \
            --write \
            --outputs "$GITHUB_OUTPUT"

      - name: Commit release version
        if: steps.release.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: release v${{ steps.release.outputs.next_version }} [skip ci]"
          git tag "v${{ steps.release.outputs.next_version }}"
          git push origin "HEAD:main" --follow-tags
