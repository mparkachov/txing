name: Txing Stable Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: txing-stable-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.95.0
  UNIT_DAEMON_ASSET: txing-unit-daemon-linux-aarch64.tar.gz
  SPARKPLUG_MANAGER_ASSET: txing-sparkplug-manager-linux-aarch64.tar.gz
  BLE_CONNECTIVITY_ASSET: txing-ble-connectivity-linux-aarch64.tar.gz
  AWS_CONNECTIVITY_ASSET: txing-aws-connectivity-linux-aarch64.tar.gz
  RIG_DEPLOY_ASSET: txing-rig-deploy-linux-aarch64.tar.gz
  GREENGRASS_LITE_ASSET: txing-greengrass-lite-linux-aarch64.tar.gz

jobs:
  stable-release:
    name: Build and publish stable artifacts
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Greengrass Lite submodule from upstream main
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init --remote modules/aws-greengrass/aws-greengrass-lite

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "VERSION must contain a stable semantic version like x.y.z, got: $version" >&2
            exit 1
          fi
          version_major_num=$((10#${BASH_REMATCH[1]}))
          version_minor_num=$((10#${BASH_REMATCH[2]}))
          version_patch_num=$((10#${BASH_REMATCH[3]}))

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Stable release workflow must be run manually from a branch, got ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Stable release workflow is only allowed from main, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          git fetch --tags --force origin
          latest_stable_version=""
          latest_major_num=0
          latest_minor_num=0
          latest_patch_num=0
          while IFS= read -r tag; do
            candidate="${tag#v}"
            if [[ ! "$candidate" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              continue
            fi
            candidate_major_num=$((10#${BASH_REMATCH[1]}))
            candidate_minor_num=$((10#${BASH_REMATCH[2]}))
            candidate_patch_num=$((10#${BASH_REMATCH[3]}))
            if [ -z "$latest_stable_version" ] ||
              (( candidate_major_num > latest_major_num ||
                (candidate_major_num == latest_major_num && candidate_minor_num > latest_minor_num) ||
                (candidate_major_num == latest_major_num && candidate_minor_num == latest_minor_num && candidate_patch_num > latest_patch_num) )); then
              latest_stable_version="$candidate"
              latest_major_num="$candidate_major_num"
              latest_minor_num="$candidate_minor_num"
              latest_patch_num="$candidate_patch_num"
            fi
          done < <(git tag --list 'v*')

          if [ -n "$latest_stable_version" ] &&
            (( version_major_num < latest_major_num ||
              (version_major_num == latest_major_num && version_minor_num < latest_minor_num) ||
              (version_major_num == latest_major_num && version_minor_num == latest_minor_num && version_patch_num <= latest_patch_num) )); then
            echo "Pushed VERSION $version must be greater than latest stable tag v$latest_stable_version." >&2
            exit 1
          fi

          tag="v$version"
          release_target="$(git rev-parse HEAD)"
          greengrass_lite_version="$(tr -d '[:space:]' < modules/aws-greengrass/aws-greengrass-lite/version)"
          if [[ ! "$greengrass_lite_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Greengrass Lite version must be semantic version x.y.z, got: $greengrass_lite_version" >&2
            exit 1
          fi
          greengrass_lite_tag="greengrass-lite-v$greengrass_lite_version"

          {
            echo "### Txing stable release"
            echo
            echo "- Pushed VERSION: \`$version\`"
            if [ -n "$latest_stable_version" ]; then
              echo "- Latest stable tag: \`v$latest_stable_version\`"
            else
              echo "- Latest stable tag: none"
            fi
            echo "- Tag: \`$tag\`"
            echo "- Commit: \`$release_target\`"
            echo "- Greengrass Lite tag: \`$greengrass_lite_tag\`"
          } >>"$GITHUB_STEP_SUMMARY"

          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "latest_stable_version=$latest_stable_version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "release_target=$release_target" >>"$GITHUB_OUTPUT"
          echo "greengrass_lite_version=$greengrass_lite_version" >>"$GITHUB_OUTPUT"
          echo "greengrass_lite_tag=$greengrass_lite_tag" >>"$GITHUB_OUTPUT"

      - name: Check Greengrass Lite release
        id: greengrass_lite
        env:
          GH_TOKEN: ${{ github.token }}
          GGL_TAG: ${{ steps.metadata.outputs.greengrass_lite_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GGL_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "build=false" >>"$GITHUB_OUTPUT"
            echo "Greengrass Lite release $GGL_TAG already exists; skipping Greengrass Lite build." >>"$GITHUB_STEP_SUMMARY"
          else
            echo "build=true" >>"$GITHUB_OUTPUT"
            echo "Greengrass Lite release $GGL_TAG does not exist; building it." >>"$GITHUB_STEP_SUMMARY"
          fi

      - name: Reject existing immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Stable release $TAG already exists; stable releases are immutable." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Stable tag $TAG already exists; stable releases are immutable." >&2
            exit 1
          fi

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake perl file curl git \
            libssl-dev libcurl4-openssl-dev libdbus-1-dev uuid-dev \
            libzip-dev libyaml-dev libsystemd-dev libevent-dev liburiparser-dev

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Install uv
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user uv || python3 -m pip install --user --break-system-packages uv
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version

      - name: Check release version surfaces
        shell: bash
        run: |
          set -euo pipefail

          python3 release/src/txing_release/cli.py check

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            devices/unit/daemon/target
            rig/target
          key: cargo-stable-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles('devices/unit/daemon/Cargo.lock', 'rig/Cargo.lock') }}
          restore-keys: |
            cargo-stable-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test Rust artifacts
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path devices/unit/daemon/Cargo.toml
          cargo test --manifest-path rig/Cargo.toml --workspace

      - name: Build Rust artifacts
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path devices/unit/daemon/Cargo.toml --bin daemon
          TXING_REAL_CC="${CC:-cc}" CC="$PWD/rig/tools/cc-greengrass-info-log" \
            cargo build --release --features greengrass-sdk --manifest-path rig/sparkplug-manager/Cargo.toml
          TXING_REAL_CC="${CC:-cc}" CC="$PWD/rig/tools/cc-greengrass-info-log" \
            cargo build --release --features greengrass-sdk --manifest-path rig/ble-connectivity/Cargo.toml
          TXING_REAL_CC="${CC:-cc}" CC="$PWD/rig/tools/cc-greengrass-info-log" \
            cargo build --release --features greengrass-sdk --manifest-path rig/aws-connectivity/Cargo.toml

      - name: Build Greengrass Lite
        if: steps.greengrass_lite.outputs.build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cmake \
            -S modules/aws-greengrass/aws-greengrass-lite \
            -B "$RUNNER_TEMP/greengrass-lite-build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DGG_LOG_LEVEL=INFO \
            -DGGL_SYSTEMD_SYSTEM_USER=ggcore \
            -DGGL_SYSTEMD_SYSTEM_GROUP=ggcore \
            -DGGL_SYSTEMD_SYSTEM_DIR=/usr/lib/systemd/system
          cmake --build "$RUNNER_TEMP/greengrass-lite-build" --config MinSizeRel --parallel
          test -x "$RUNNER_TEMP/greengrass-lite-build/bin/ggl-cli"

      - name: Package project release assets
        shell: bash
        run: |
          set -euo pipefail

          package_binary() {
            local source="$1"
            local binary_name="$2"
            local asset_name="$3"
            local package_dir="$RUNNER_TEMP/package-$binary_name"
            local asset_path="$RUNNER_TEMP/$asset_name"
            rm -rf "$package_dir"
            install -d "$package_dir"
            install -m 755 "$source" "$package_dir/$binary_name"
            if file "$package_dir/$binary_name" | grep -q 'ELF'; then
              strip "$package_dir/$binary_name"
            fi
            file "$package_dir/$binary_name"
            tar -C "$package_dir" -czf "$asset_path" "$binary_name"
            archive_listing="$(tar -tzf "$asset_path")"
            if [ "$archive_listing" != "$binary_name" ]; then
              echo "Expected $asset_name to contain only root-level $binary_name, got:" >&2
              printf '%s\n' "$archive_listing" >&2
              exit 1
            fi
          }

          package_binary devices/unit/daemon/target/release/daemon txing-unit-daemon "$UNIT_DAEMON_ASSET"
          package_binary rig/target/release/txing-sparkplug-manager txing-sparkplug-manager "$SPARKPLUG_MANAGER_ASSET"
          package_binary rig/target/release/txing-ble-connectivity txing-ble-connectivity "$BLE_CONNECTIVITY_ASSET"
          package_binary rig/target/release/txing-aws-connectivity txing-aws-connectivity "$AWS_CONNECTIVITY_ASSET"
          package_binary rig/scripts/txing-rig-deploy txing-rig-deploy "$RIG_DEPLOY_ASSET"

      - name: Package Greengrass Lite release asset
        if: steps.greengrass_lite.outputs.build == 'true'
        env:
          GGL_VERSION: ${{ steps.metadata.outputs.greengrass_lite_version }}
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/package-txing-greengrass-lite"
          payload_dir="$package_dir/txing-greengrass-lite-payload"
          install_root="$RUNNER_TEMP/greengrass-lite-install-root"
          rm -rf "$package_dir"
          rm -rf "$install_root"
          install -d "$payload_dir/bin" "$payload_dir/systemd" "$payload_dir/tmpfiles" "$install_root" "$package_dir"
          DESTDIR="$install_root" cmake --install "$RUNNER_TEMP/greengrass-lite-build" --config MinSizeRel
          if [ -e "$install_root/lib" ]; then
            echo "Refusing to package unsafe top-level /lib payload: $install_root/lib" >&2
            exit 1
          fi
          test -d "$install_root/usr/local/bin"
          test -d "$install_root/usr/lib/systemd/system"
          cp -a "$install_root/usr/local/bin/." "$payload_dir/bin/"
          cp -a "$install_root/usr/lib/systemd/system/." "$payload_dir/systemd/"
          if [ -d "$install_root/usr/local/lib/tmpfiles.d" ]; then
            cp -a "$install_root/usr/local/lib/tmpfiles.d/." "$payload_dir/tmpfiles/"
          fi
          test -x "$payload_dir/bin/ggl-cli"
          test -r "$payload_dir/systemd/greengrass-lite.target"
          install -m 755 rig/scripts/txing-greengrass-lite "$package_dir/txing-greengrass-lite"
          cat >"$payload_dir/metadata.env" <<EOF
          TXING_GREENGRASS_LITE_VERSION=$GGL_VERSION
          TXING_GREENGRASS_LITE_UPSTREAM_VERSION=$GGL_VERSION
          TXING_GREENGRASS_LITE_UPSTREAM_COMMIT=$(git -C modules/aws-greengrass/aws-greengrass-lite rev-parse HEAD)
          EOF
          tar -C "$package_dir" -czf "$RUNNER_TEMP/$GREENGRASS_LITE_ASSET" \
            txing-greengrass-lite \
            txing-greengrass-lite-payload

      - name: Publish Greengrass Lite release
        if: steps.greengrass_lite.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GGL_TAG: ${{ steps.metadata.outputs.greengrass_lite_tag }}
          GGL_VERSION: ${{ steps.metadata.outputs.greengrass_lite_version }}
          RELEASE_TARGET: ${{ steps.metadata.outputs.release_target }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat >"$notes_file" <<NOTES
          Txing Greengrass Lite payload.

          - Version: $GGL_VERSION
          - Tag: $GGL_TAG
          - Commit: $RELEASE_TARGET
          - Asset: $GREENGRASS_LITE_ASSET
          NOTES

          gh release create "$GGL_TAG" "$RUNNER_TEMP/$GREENGRASS_LITE_ASSET" \
            --target "$RELEASE_TARGET" \
            --title "$GGL_TAG" \
            --notes-file "$notes_file" \
            --latest=false

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_TARGET: ${{ steps.metadata.outputs.release_target }}
          GGL_TAG: ${{ steps.metadata.outputs.greengrass_lite_tag }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat >"$notes_file" <<NOTES
          Txing stable release.

          - Version: $VERSION
          - Tag: $TAG
          - Commit: $RELEASE_TARGET
          - Assets:
            - $UNIT_DAEMON_ASSET
            - $SPARKPLUG_MANAGER_ASSET
            - $BLE_CONNECTIVITY_ASSET
            - $AWS_CONNECTIVITY_ASSET
            - $RIG_DEPLOY_ASSET
          - Greengrass Lite release: $GGL_TAG
          NOTES

          gh release create "$TAG" \
            "$RUNNER_TEMP/$UNIT_DAEMON_ASSET" \
            "$RUNNER_TEMP/$SPARKPLUG_MANAGER_ASSET" \
            "$RUNNER_TEMP/$BLE_CONNECTIVITY_ASSET" \
            "$RUNNER_TEMP/$AWS_CONNECTIVITY_ASSET" \
            "$RUNNER_TEMP/$RIG_DEPLOY_ASSET" \
            --target "$RELEASE_TARGET" \
            --title "$TAG" \
            --notes-file "$notes_file" \
            --latest=true
