name: Unit Daemon Stable Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version to release. Leave blank to use the next minor version from VERSION."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: unit-daemon-stable-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.95.0
  ASSET_NAME: txing-unit-daemon-linux-aarch64.tar.gz
  BINARY_NAME: txing-unit-daemon

jobs:
  stable-release:
    name: Build and publish stable daemon
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        env:
          VERSION_INPUT: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$current_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "VERSION must contain a stable semantic version like x.y.z, got: $current_version" >&2
            exit 1
          fi
          current_major="${BASH_REMATCH[1]}"
          current_minor="${BASH_REMATCH[2]}"
          current_patch="${BASH_REMATCH[3]}"
          current_major_num=$((10#$current_major))
          current_minor_num=$((10#$current_minor))
          current_patch_num=$((10#$current_patch))

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Stable release workflow must be run manually from a branch, got ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Stable release workflow is only allowed from main, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          requested_version="$(printf '%s' "$VERSION_INPUT" | tr -d '[:space:]')"
          if [ -z "$requested_version" ]; then
            version="$current_major.$((current_minor_num + 1)).0"
            version_source="next-minor-default"
          else
            version="$requested_version"
            version_source="workflow-input"
          fi
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Stable release version must be semantic version x.y.z, got: $version" >&2
            exit 1
          fi
          target_major_num=$((10#${BASH_REMATCH[1]}))
          target_minor_num=$((10#${BASH_REMATCH[2]}))
          target_patch_num=$((10#${BASH_REMATCH[3]}))

          if (( target_major_num < current_major_num ||
                (target_major_num == current_major_num && target_minor_num < current_minor_num) ||
                (target_major_num == current_major_num && target_minor_num == current_minor_num && target_patch_num <= current_patch_num) )); then
            echo "Stable release version must be greater than current VERSION $current_version, got $version." >&2
            exit 1
          fi

          tag="v$version"

          {
            echo "### Unit daemon stable release"
            echo
            echo "- Current VERSION: \`$current_version\`"
            echo "- Requested version: \`$version\`"
            echo "- Version source: \`$version_source\`"
            echo "- Tag: \`$tag\`"
          } >>"$GITHUB_STEP_SUMMARY"

          echo "current_version=$current_version" >>"$GITHUB_OUTPUT"
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "version_source=$version_source" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"

      - name: Reject existing immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Stable release $TAG already exists; stable releases are immutable." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Stable tag $TAG already exists; stable releases are immutable." >&2
            exit 1
          fi

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake perl file

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Install uv
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user uv || python3 -m pip install --user --break-system-packages uv
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version

      - name: Bump release version
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          python3 release/src/txing_release/cli.py bump "$VERSION"
          python3 release/src/txing_release/cli.py check
          git diff --stat

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            devices/unit/daemon/target
          key: cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles('devices/unit/daemon/Cargo.lock') }}
          restore-keys: |
            cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path devices/unit/daemon/Cargo.toml

      - name: Build daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path devices/unit/daemon/Cargo.toml --bin daemon

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="$RUNNER_TEMP/unit-daemon-package"
          asset_path="$RUNNER_TEMP/$ASSET_NAME"

          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 devices/unit/daemon/target/release/daemon "$package_dir/$BINARY_NAME"
          strip "$package_dir/$BINARY_NAME"
          file "$package_dir/$BINARY_NAME"
          tar -C "$package_dir" -czf "$asset_path" "$BINARY_NAME"

          archive_listing="$(tar -tzf "$asset_path")"
          if [ "$archive_listing" != "$BINARY_NAME" ]; then
            echo "Expected archive to contain only root-level $BINARY_NAME, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

          echo "asset_path=$asset_path" >>"$GITHUB_OUTPUT"

      - name: Commit release bump
        id: release_refs
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet || [ -n "$(git status --porcelain --untracked-files=normal)" ]; then
            git add -A
            git commit -m "release: bump version to $VERSION"
          else
            echo "Managed version files are already at $VERSION; no release bump commit needed."
          fi

          release_target="$(git rev-parse HEAD)"
          git push origin "HEAD:${GITHUB_REF_NAME}"

          echo "release_target=$release_target" >>"$GITHUB_OUTPUT"

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_TARGET: ${{ steps.release_refs.outputs.release_target }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat >"$notes_file" <<NOTES
          Unit daemon stable release.

          - Version: $VERSION
          - Tag: $TAG
          - Commit: $RELEASE_TARGET
          - Asset: $ASSET_NAME
          NOTES

          args=(
            "$TAG"
            "$ASSET_PATH"
            --target "$RELEASE_TARGET"
            --title "$TAG"
            --notes-file "$notes_file"
            --latest=true
          )

          gh release create "${args[@]}"
