name: Unit Daemon Feature Prerelease

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unit-daemon-feature-prerelease-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.95.0
  ASSET_NAME: txing-unit-daemon-linux-aarch64.tar.gz
  BINARY_NAME: txing-unit-daemon
  FEATURE_PRERELEASE_RETAIN: 10

jobs:
  feature-prerelease:
    name: Build and publish feature daemon prerelease
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve prerelease metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version_base="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version_base" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must contain a base semantic version like x.y.z, got: $version_base" >&2
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Feature prerelease workflow must be run manually from a branch, got ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != feature/* ]]; then
            echo "Feature prerelease workflow is only allowed from feature/* branches, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          timestamp="$(date -u +%s)"
          version="$major.$minor.$((patch + 1))-feature.$timestamp"
          tag="v$version"
          release_target="$(git rev-parse HEAD)"

          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >>"$GITHUB_OUTPUT"
          echo "release_target=$release_target" >>"$GITHUB_OUTPUT"

      - name: Reject existing feature prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Feature prerelease $TAG already exists." >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Feature prerelease tag $TAG already exists." >&2
            exit 1
          fi

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake perl file

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            devices/unit/daemon/target
          key: cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles('devices/unit/daemon/Cargo.lock') }}
          restore-keys: |
            cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path devices/unit/daemon/Cargo.toml

      - name: Build daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path devices/unit/daemon/Cargo.toml --bin daemon

      - name: Package prerelease asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="$RUNNER_TEMP/unit-daemon-package"
          asset_path="$RUNNER_TEMP/$ASSET_NAME"

          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 devices/unit/daemon/target/release/daemon "$package_dir/$BINARY_NAME"
          strip "$package_dir/$BINARY_NAME"
          file "$package_dir/$BINARY_NAME"
          tar -C "$package_dir" -czf "$asset_path" "$BINARY_NAME"

          archive_listing="$(tar -tzf "$asset_path")"
          if [ "$archive_listing" != "$BINARY_NAME" ]; then
            echo "Expected archive to contain only root-level $BINARY_NAME, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

          echo "asset_path=$asset_path" >>"$GITHUB_OUTPUT"

      - name: Publish feature prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          BRANCH: ${{ steps.metadata.outputs.branch }}
          TIMESTAMP: ${{ steps.metadata.outputs.timestamp }}
          RELEASE_TARGET: ${{ steps.metadata.outputs.release_target }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          old_tags_file="$(mktemp)"
          cleanup() {
            rm -f "$notes_file" "$old_tags_file"
          }
          trap cleanup EXIT

          build_host="$(hostname)"
          build_kernel="$(uname -a)"

          cat >"$notes_file" <<NOTES
          Unit daemon feature prerelease.

          - Version: $VERSION
          - Tag: $TAG
          - Branch: $BRANCH
          - Commit: $RELEASE_TARGET
          - Asset: $ASSET_NAME
          - Build host: $build_host
          - Build kernel: $build_kernel
          - Timestamp: $TIMESTAMP
          NOTES

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "unit daemon feature prerelease $VERSION" "$RELEASE_TARGET"
          git push origin "refs/tags/$TAG:refs/tags/$TAG"

          gh release create "$TAG" "$ASSET_PATH" \
            --prerelease \
            --latest=false \
            --verify-tag \
            --title "$TAG" \
            --notes-file "$notes_file"

          gh api --paginate repos/{owner}/{repo}/releases \
            --jq '.[] | select(.prerelease == true) | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-feature\\.[0-9]+$")) | select(any(.assets[]?; .name == "'"$ASSET_NAME"'")) | [.tag_name, .published_at] | @tsv' \
            | sort -r -k2,2 \
            | awk -v retain="$FEATURE_PRERELEASE_RETAIN" 'NR > retain {print $1}' \
            >"$old_tags_file"

          while IFS= read -r old_tag; do
            [ -n "$old_tag" ] || continue
            printf 'pruning old unit daemon feature prerelease %s\n' "$old_tag"
            gh release delete "$old_tag" --cleanup-tag --yes
          done <"$old_tags_file"

          printf 'published unit daemon feature prerelease\n'
          printf '  tag: %s\n' "$TAG"
          printf '  branch: %s\n' "$BRANCH"
          printf '  asset: %s\n' "$ASSET_PATH"
