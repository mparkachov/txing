name: Unit Daemon Feature Prerelease

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: unit-daemon-feature-prerelease-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.95.0
  UNIT_DAEMON_ASSET: txing-unit-daemon-linux-aarch64.tar.gz
  UNIT_DAEMON_BINARY: txing-unit-daemon
  KVS_MASTER_ASSET: txing-board-kvs-master-linux-aarch64.tar.gz
  KVS_MASTER_BINARY: txing-board-kvs-master
  KVS_MASTER_BUILD_IMAGE: debian:trixie
  FEATURE_PRERELEASE_RETAIN: 10

jobs:
  feature-prerelease:
    name: Build and publish feature daemon prerelease
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve prerelease metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version_base="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version_base" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must contain a base semantic version like x.y.z, got: $version_base" >&2
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Feature prerelease workflow must be run manually from a branch, got ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != feature/* ]]; then
            echo "Feature prerelease workflow is only allowed from feature/* branches, got: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          timestamp="$(date -u +%s)"
          version="$major.$minor.$((patch + 1))-feature.$timestamp"
          tag="v$version"
          release_target="$(git rev-parse HEAD)"

          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >>"$GITHUB_OUTPUT"
          echo "release_target=$release_target" >>"$GITHUB_OUTPUT"

      - name: Reject existing feature prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Feature prerelease $TAG already exists." >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Feature prerelease tag $TAG already exists." >&2
            exit 1
          fi

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake perl file curl git \
            ca-certificates

      - name: Install mise tools
        shell: bash
        run: |
          set -euo pipefail
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >>"$GITHUB_PATH"
          echo "$HOME/.local/share/mise/shims" >>"$GITHUB_PATH"
          mise_bin="$HOME/.local/bin/mise"
          "$mise_bin" --version
          "$mise_bin" use --global --yes uv@latest just@latest
          "$mise_bin" exec -- uv --version
          "$mise_bin" exec -- just --version

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            devices/unit/daemon/target
          key: cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles('devices/unit/daemon/Cargo.lock') }}
          restore-keys: |
            cargo-unit-daemon-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path devices/unit/daemon/Cargo.toml

      - name: Build daemon
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --manifest-path devices/unit/daemon/Cargo.toml --bin daemon

      - name: Build native KVS master in Trixie container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            -e DEBIAN_FRONTEND=noninteractive \
            "$KVS_MASTER_BUILD_IMAGE" \
            bash -se <<'TRIXIE_BUILD'
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl gnupg
          install -d -m 755 /etc/apt/keyrings
          curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key \
            | gpg --dearmor -o /etc/apt/keyrings/raspberrypi-archive-keyring.gpg
          cat >/etc/apt/sources.list.d/raspi.sources <<'APT_SOURCE'
          Types: deb
          URIs: https://archive.raspberrypi.com/debian/
          Suites: trixie
          Components: main
          Architectures: arm64
          Signed-By: /etc/apt/keyrings/raspberrypi-archive-keyring.gpg
          APT_SOURCE
          cat >/etc/apt/preferences.d/raspi-libcamera <<'APT_PREFERENCES'
          Package: libcamera* python3-libcamera gstreamer1.0-libcamera
          Pin: origin archive.raspberrypi.com
          Pin-Priority: 1001
          APT_PREFERENCES
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake perl file curl git ca-certificates \
            libssl-dev libcurl4-openssl-dev liblog4cplus-dev libsrtp2-dev \
            libusrsctp-dev libwebsockets-dev zlib1g-dev libcamera-dev
          apt-cache policy libcamera-dev libcamera0.7
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise use --global --yes just@latest
          git config --global --add safe.directory "$PWD"
          just unit::board::submodules
          just unit::board::build-native
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master
          if ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -Fq "not found"; then
            echo "txing-board-kvs-master has unresolved shared libraries" >&2
            exit 1
          fi
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -F "libcamera.so.0.7"
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -F "libcamera-base.so.0.7"
          TRIXIE_BUILD

      - name: Package prerelease assets
        id: package
        shell: bash
        run: |
          set -euo pipefail

          package_binary() {
            local source="$1"
            local binary_name="$2"
            local asset_name="$3"
            local package_dir="$RUNNER_TEMP/package-$binary_name"
            local asset_path="$RUNNER_TEMP/$asset_name"
            rm -rf "$package_dir"
            install -d "$package_dir"
            install -m 755 "$source" "$package_dir/$binary_name"
            strip "$package_dir/$binary_name"
            file "$package_dir/$binary_name"
            tar -C "$package_dir" -czf "$asset_path" "$binary_name"
            archive_listing="$(tar -tzf "$asset_path")"
            if [ "$archive_listing" != "$binary_name" ]; then
              echo "Expected $asset_name to contain only root-level $binary_name, got:" >&2
              printf '%s\n' "$archive_listing" >&2
              exit 1
            fi
          }

          package_binary devices/unit/daemon/target/release/daemon "$UNIT_DAEMON_BINARY" "$UNIT_DAEMON_ASSET"
          package_binary devices/unit/board/kvs_master/build/txing-board-kvs-master "$KVS_MASTER_BINARY" "$KVS_MASTER_ASSET"

          echo "unit_daemon_asset_path=$RUNNER_TEMP/$UNIT_DAEMON_ASSET" >>"$GITHUB_OUTPUT"
          echo "kvs_master_asset_path=$RUNNER_TEMP/$KVS_MASTER_ASSET" >>"$GITHUB_OUTPUT"

      - name: Publish feature prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          BRANCH: ${{ steps.metadata.outputs.branch }}
          TIMESTAMP: ${{ steps.metadata.outputs.timestamp }}
          RELEASE_TARGET: ${{ steps.metadata.outputs.release_target }}
          UNIT_DAEMON_ASSET_PATH: ${{ steps.package.outputs.unit_daemon_asset_path }}
          KVS_MASTER_ASSET_PATH: ${{ steps.package.outputs.kvs_master_asset_path }}
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          old_tags_file="$(mktemp)"
          cleanup() {
            rm -f "$notes_file" "$old_tags_file"
          }
          trap cleanup EXIT

          build_host="$(hostname)"
          build_kernel="$(uname -a)"

          cat >"$notes_file" <<NOTES
          Unit daemon feature prerelease.

          - Version: $VERSION
          - Tag: $TAG
          - Branch: $BRANCH
          - Commit: $RELEASE_TARGET
          - Assets:
            - $UNIT_DAEMON_ASSET
            - $KVS_MASTER_ASSET
          - Build host: $build_host
          - Build kernel: $build_kernel
          - Timestamp: $TIMESTAMP
          NOTES

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "unit daemon feature prerelease $VERSION" "$RELEASE_TARGET"
          git push origin "refs/tags/$TAG:refs/tags/$TAG"

          gh release create "$TAG" "$UNIT_DAEMON_ASSET_PATH" "$KVS_MASTER_ASSET_PATH" \
            --prerelease \
            --latest=false \
            --verify-tag \
            --title "$TAG" \
            --notes-file "$notes_file"

          gh api --paginate repos/{owner}/{repo}/releases \
            --jq '.[] | select(.prerelease == true) | select(.tag_name | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-feature\\.[0-9]+$")) | select(any(.assets[]?; .name == "'"$UNIT_DAEMON_ASSET"'")) | [.tag_name, .published_at] | @tsv' \
            | sort -r -k2,2 \
            | awk -v retain="$FEATURE_PRERELEASE_RETAIN" 'NR > retain {print $1}' \
            >"$old_tags_file"

          while IFS= read -r old_tag; do
            [ -n "$old_tag" ] || continue
            printf 'pruning old unit daemon feature prerelease %s\n' "$old_tag"
            gh release delete "$old_tag" --cleanup-tag --yes
          done <"$old_tags_file"

          printf 'published unit daemon feature prerelease\n'
          printf '  tag: %s\n' "$TAG"
          printf '  branch: %s\n' "$BRANCH"
          printf '  asset: %s\n' "$UNIT_DAEMON_ASSET_PATH"
          printf '  asset: %s\n' "$KVS_MASTER_ASSET_PATH"
