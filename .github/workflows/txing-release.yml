name: Txing Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: txing-release-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_VERSION: 1.95.0
  UNIT_DAEMON_ASSET: txing-unit-daemon-linux-aarch64.tar.gz
  KVS_MASTER_ASSET: txing-board-kvs-master-linux-aarch64.tar.gz
  KVS_MASTER_BINARY: txing-board-kvs-master
  SPARKPLUG_MANAGER_ASSET: txing-sparkplug-manager-linux-aarch64.tar.gz
  BLE_CONNECTIVITY_ASSET: txing-ble-connectivity-linux-aarch64.tar.gz
  AWS_CONNECTIVITY_ASSET: txing-aws-connectivity-linux-aarch64.tar.gz
  RIG_DEPLOY_ASSET: txing-rig-deploy-linux-aarch64.tar.gz
  WITNESS_LAMBDA_ASSET: txing-witness-lambda-linux-aarch64.zip
  CLOUD_RIG_LAMBDA_ASSET: txing-cloud-rig-lambda-linux-aarch64.zip
  CLOUD_MCU_LAMBDA_ASSET: txing-cloud-mcu-lambda-linux-aarch64.zip
  KVS_MASTER_BUILD_IMAGE: debian:trixie
  RELEASE_RETENTION_COUNT: "10"

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      latest_release_version: ${{ steps.metadata.outputs.latest_release_version }}
      tag: ${{ steps.metadata.outputs.tag }}
      release_target: ${{ steps.metadata.outputs.release_target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "VERSION must contain a semantic version like x.y.z, got: $version" >&2
            exit 1
          fi
          version_major_num=$((10#${BASH_REMATCH[1]}))
          version_minor_num=$((10#${BASH_REMATCH[2]}))
          version_patch_num=$((10#${BASH_REMATCH[3]}))

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Release workflow must be run manually from a branch, got ref type: ${GITHUB_REF_TYPE}" >&2
            exit 1
          fi

          git fetch --tags --force origin
          latest_release_version=""
          latest_major_num=0
          latest_minor_num=0
          latest_patch_num=0
          while IFS= read -r tag; do
            candidate="${tag#v}"
            if [[ ! "$candidate" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              continue
            fi
            candidate_major_num=$((10#${BASH_REMATCH[1]}))
            candidate_minor_num=$((10#${BASH_REMATCH[2]}))
            candidate_patch_num=$((10#${BASH_REMATCH[3]}))
            if [ -z "$latest_release_version" ] ||
              (( candidate_major_num > latest_major_num ||
                (candidate_major_num == latest_major_num && candidate_minor_num > latest_minor_num) ||
                (candidate_major_num == latest_major_num && candidate_minor_num == latest_minor_num && candidate_patch_num > latest_patch_num) )); then
              latest_release_version="$candidate"
              latest_major_num="$candidate_major_num"
              latest_minor_num="$candidate_minor_num"
              latest_patch_num="$candidate_patch_num"
            fi
          done < <(git tag --list 'v*')

          if [ -n "$latest_release_version" ] &&
            (( version_major_num < latest_major_num ||
              (version_major_num == latest_major_num && version_minor_num < latest_minor_num) ||
              (version_major_num == latest_major_num && version_minor_num == latest_minor_num && version_patch_num <= latest_patch_num) )); then
            echo "Pushed VERSION $version must be greater than latest release tag v$latest_release_version." >&2
            exit 1
          fi

          tag="v$version"
          release_target="$(git rev-parse HEAD)"

          {
            echo "### Txing release"
            echo
            echo "- Pushed VERSION: \`$version\`"
            if [ -n "$latest_release_version" ]; then
              echo "- Latest release tag: \`v$latest_release_version\`"
            else
              echo "- Latest release tag: none"
            fi
            echo "- Tag: \`$tag\`"
            echo "- Commit: \`$release_target\`"
          } >>"$GITHUB_STEP_SUMMARY"

          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "latest_release_version=$latest_release_version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "release_target=$release_target" >>"$GITHUB_OUTPUT"

      - name: Reject existing immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; releases are immutable." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Release tag $TAG already exists; releases are immutable." >&2
            exit 1
          fi

      - name: Check release version surfaces
        shell: bash
        run: |
          set -euo pipefail

          python3 release/src/txing_release/cli.py check

  build-rust-binary:
    name: Build ${{ matrix.binary_name }}
    runs-on: ubuntu-24.04-arm
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary_name: txing-unit-daemon
            manifest_path: devices/unit/daemon/Cargo.toml
            binary_path: devices/unit/daemon/target/release/daemon
            asset_name: txing-unit-daemon-linux-aarch64.tar.gz
            test_command: cargo test --manifest-path devices/unit/daemon/Cargo.toml
            build_command: cargo build --release --manifest-path devices/unit/daemon/Cargo.toml --bin daemon
            greengrass_cc: "false"
          - binary_name: txing-sparkplug-manager
            manifest_path: rig/sparkplug-manager/Cargo.toml
            binary_path: rig/target/release/txing-sparkplug-manager
            asset_name: txing-sparkplug-manager-linux-aarch64.tar.gz
            test_command: ""
            build_command: cargo build --release --features greengrass-sdk --manifest-path rig/sparkplug-manager/Cargo.toml
            greengrass_cc: "true"
          - binary_name: txing-ble-connectivity
            manifest_path: rig/ble-connectivity/Cargo.toml
            binary_path: rig/target/release/txing-ble-connectivity
            asset_name: txing-ble-connectivity-linux-aarch64.tar.gz
            test_command: ""
            build_command: cargo build --release --features greengrass-sdk --manifest-path rig/ble-connectivity/Cargo.toml
            greengrass_cc: "true"
          - binary_name: txing-aws-connectivity
            manifest_path: rig/aws-connectivity/Cargo.toml
            binary_path: rig/target/release/txing-aws-connectivity
            asset_name: txing-aws-connectivity-linux-aarch64.tar.gz
            test_command: ""
            build_command: cargo build --release --features greengrass-sdk --manifest-path rig/aws-connectivity/Cargo.toml
            greengrass_cc: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure apt networking
        shell: bash
        run: |
          set -euo pipefail
          for source in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$source" ] || continue
            sudo sed -i 's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' "$source"
          done
          printf 'Acquire::ForceIPv4 "true";\nAcquire::Retries "5";\n' \
            | sudo tee /etc/apt/apt.conf.d/99txing-ci-network >/dev/null

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake perl file curl git \
            libssl-dev libcurl4-openssl-dev libdbus-1-dev uuid-dev \
            libzip-dev libyaml-dev libsystemd-dev libevent-dev liburiparser-dev \
            liblog4cplus-dev libsrtp2-dev libusrsctp-dev libwebsockets-dev \
            zlib1g-dev

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            devices/unit/daemon/target
            rig/target
          key: cargo-release-${{ matrix.binary_name }}-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles(matrix.manifest_path, 'devices/unit/daemon/Cargo.lock', 'rig/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ matrix.binary_name }}-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-
            cargo-release-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test ${{ matrix.binary_name }}
        if: matrix.test_command != ''
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.test_command }}

      - name: Build ${{ matrix.binary_name }}
        env:
          TXING_DAEMON_BUILD_VERSION: ${{ needs.metadata.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.greengrass_cc }}" = "true" ]; then
            TXING_REAL_CC="${CC:-cc}" CC="$PWD/rig/tools/cc-greengrass-info-log" \
              ${{ matrix.build_command }}
          else
            ${{ matrix.build_command }}
          fi

      - name: Package ${{ matrix.asset_name }}
        shell: bash
        run: |
          set -euo pipefail
          source="${{ matrix.binary_path }}"
          binary_name="${{ matrix.binary_name }}"
          asset_name="${{ matrix.asset_name }}"
          package_dir="$RUNNER_TEMP/package-$binary_name"
          asset_path="$RUNNER_TEMP/$asset_name"
          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 "$source" "$package_dir/$binary_name"
          if file "$package_dir/$binary_name" | grep -q 'ELF'; then
            strip "$package_dir/$binary_name"
          fi
          file "$package_dir/$binary_name"
          tar -C "$package_dir" -czf "$asset_path" "$binary_name"
          archive_listing="$(tar -tzf "$asset_path")"
          if [ "$archive_listing" != "$binary_name" ]; then
            echo "Expected $asset_name to contain only root-level $binary_name, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

      - name: Upload ${{ matrix.asset_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ runner.temp }}/${{ matrix.asset_name }}
          if-no-files-found: error

  test-rig-workspace:
    name: Test rig Rust workspace
    runs-on: ubuntu-24.04-arm
    needs: metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure apt networking
        shell: bash
        run: |
          set -euo pipefail
          for source in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$source" ] || continue
            sudo sed -i 's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' "$source"
          done
          printf 'Acquire::ForceIPv4 "true";\nAcquire::Retries "5";\n' \
            | sudo tee /etc/apt/apt.conf.d/99txing-ci-network >/dev/null

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake perl file curl git \
            libssl-dev libcurl4-openssl-dev libdbus-1-dev uuid-dev \
            libzip-dev libyaml-dev libsystemd-dev libevent-dev liburiparser-dev \
            liblog4cplus-dev libsrtp2-dev libusrsctp-dev libwebsockets-dev \
            zlib1g-dev

      - name: Restore Rust toolchain cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/1.95.0-aarch64-unknown-linux-gnu
            ~/.rustup/update-hashes/1.95.0-aarch64-unknown-linux-gnu
          key: rustup-${{ runner.os }}-${{ runner.arch }}-1.95.0

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc -vV
          cargo -V

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            rig/target
          key: cargo-release-rig-tests-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-${{ hashFiles('rig/Cargo.lock') }}
          restore-keys: |
            cargo-release-rig-tests-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-
            cargo-release-${{ runner.os }}-${{ runner.arch }}-rust-1.95.0-

      - name: Test rig Rust workspace
        shell: bash
        run: |
          set -euo pipefail
          cargo test --manifest-path rig/Cargo.toml --workspace

  build-lambda:
    name: Build ${{ matrix.function_name }}
    runs-on: ubuntu-24.04-arm
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - function_name: txing-witness-lambda
            working_directory: witness
            package_path: ./cmd/txing-witness-lambda
            asset_name: txing-witness-lambda-linux-aarch64.zip
          - function_name: txing-cloud-rig-lambda
            working_directory: devices/cloud-mcu/lambda
            package_path: ./cmd/txing-cloud-rig-lambda
            asset_name: txing-cloud-rig-lambda-linux-aarch64.zip
          - function_name: txing-cloud-mcu-lambda
            working_directory: devices/cloud-mcu/lambda
            package_path: ./cmd/txing-cloud-mcu-lambda
            asset_name: txing-cloud-mcu-lambda-linux-aarch64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure apt networking
        shell: bash
        run: |
          set -euo pipefail
          for source in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$source" ] || continue
            sudo sed -i 's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' "$source"
          done
          printf 'Acquire::ForceIPv4 "true";\nAcquire::Retries "5";\n' \
            | sudo tee /etc/apt/apt.conf.d/99txing-ci-network >/dev/null

      - name: Install system build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update

          go_package=""
          go_root=""
          for version in 1.26 1.25 1.24; do
            candidate="golang-${version}-go"
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              go_package="$candidate"
              go_root="/usr/lib/go-${version}"
              break
            fi
          done
          if [ -z "$go_package" ]; then
            echo "Expected a Go 1.24+ compiler package in Ubuntu Noble apt repositories." >&2
            exit 1
          fi

          sudo apt-get install -y \
            ca-certificates file git "$go_package" unzip zip
          echo "$go_root/bin" >>"$GITHUB_PATH"
          "$go_root/bin/go" version

      - name: Restore Go cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-lambda-${{ matrix.function_name }}-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('witness/go.mod', 'witness/go.sum', 'devices/cloud-mcu/lambda/go.mod', 'devices/cloud-mcu/lambda/go.sum') }}
          restore-keys: |
            go-lambda-${{ matrix.function_name }}-${{ runner.os }}-${{ runner.arch }}-
            go-lambda-${{ runner.os }}-${{ runner.arch }}-

      - name: Test and build ${{ matrix.function_name }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ matrix.working_directory }}"
          go version
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go test -tags lambda.norpc ./...
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -tags lambda.norpc -ldflags="-s -w" \
            -o "$RUNNER_TEMP/${{ matrix.function_name }}" \
            "${{ matrix.package_path }}"

      - name: Package ${{ matrix.asset_name }}
        shell: bash
        run: |
          set -euo pipefail
          source="$RUNNER_TEMP/${{ matrix.function_name }}"
          package_dir="$RUNNER_TEMP/package-${{ matrix.function_name }}"
          asset_path="$RUNNER_TEMP/${{ matrix.asset_name }}"
          test -x "$source"
          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 "$source" "$package_dir/bootstrap"
          bootstrap_file="$(file "$package_dir/bootstrap")"
          echo "$bootstrap_file"
          if ! grep -q 'ELF 64-bit LSB executable, ARM aarch64' <<<"$bootstrap_file"; then
            echo "Expected ${{ matrix.function_name }} bootstrap to be a Linux ARM64 executable, got:" >&2
            echo "$bootstrap_file" >&2
            exit 1
          fi
          ldd_output="$(ldd "$package_dir/bootstrap" 2>&1 || true)"
          if ! grep -Eq 'not a dynamic executable|statically linked' <<<"$ldd_output"; then
            echo "Expected ${{ matrix.function_name }} bootstrap to be statically linked, got:" >&2
            printf '%s\n' "$ldd_output" >&2
            exit 1
          fi
          (cd "$package_dir" && zip -q "$asset_path" bootstrap)
          archive_listing="$(unzip -Z1 "$asset_path")"
          if [ "$archive_listing" != "bootstrap" ]; then
            echo "Expected ${{ matrix.asset_name }} to contain only root-level bootstrap, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

      - name: Upload ${{ matrix.asset_name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ runner.temp }}/${{ matrix.asset_name }}
          if-no-files-found: error

  build-kvs-master:
    name: Build txing-board-kvs-master
    runs-on: ubuntu-24.04-arm
    needs: metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure apt networking
        shell: bash
        run: |
          set -euo pipefail
          for source in /etc/apt/sources.list /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources; do
            [ -e "$source" ] || continue
            sudo sed -i 's|http://ports.ubuntu.com/ubuntu-ports|https://ports.ubuntu.com/ubuntu-ports|g' "$source"
          done
          printf 'Acquire::ForceIPv4 "true";\nAcquire::Retries "5";\n' \
            | sudo tee /etc/apt/apt.conf.d/99txing-ci-network >/dev/null

      - name: Install packaging tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y binutils file

      - name: Build native KVS master in Trixie container
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -i \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e KVS_MASTER_BINARY="$KVS_MASTER_BINARY" \
            "$KVS_MASTER_BUILD_IMAGE" \
          bash -se <<'TRIXIE_BUILD'
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl
          cat >/etc/apt/sources.list.d/raspi.sources <<'APT_SOURCE'
          Types: deb
          URIs: https://archive.raspberrypi.com/debian/
          Suites: trixie
          Components: main
          Architectures: arm64
          Trusted: yes
          APT_SOURCE
          cat >/etc/apt/preferences.d/raspi-libcamera <<'APT_PREFERENCES'
          Package: libcamera* python3-libcamera gstreamer1.0-libcamera
          Pin: origin archive.raspberrypi.com
          Pin-Priority: 1001
          APT_PREFERENCES
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake perl file curl git ca-certificates \
            libssl-dev libcurl4-openssl-dev liblog4cplus-dev libsrtp2-dev \
            libusrsctp-dev libwebsockets-dev zlib1g-dev libcamera-dev
          apt-cache policy libcamera-dev libcamera0.7
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise use --global --yes just@latest
          git config --global --add safe.directory "$PWD"
          git config --global --add safe.directory "$PWD/modules/awslabs/amazon-kinesis-video-streams-webrtc-sdk-c"
          just unit::daemon::kvs-submodules
          just unit::daemon::kvs-build-native
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master
          if ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -Fq "not found"; then
            echo "txing-board-kvs-master has unresolved shared libraries" >&2
            exit 1
          fi
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -F "libcamera.so.0.7"
          ldd devices/unit/board/kvs_master/build/txing-board-kvs-master | grep -F "libcamera-base.so.0.7"
          TRIXIE_BUILD
          kvs_master_build_binary="devices/unit/board/kvs_master/build/$KVS_MASTER_BINARY"
          test -x "$kvs_master_build_binary"
          file "$kvs_master_build_binary"
          install -m 755 "$kvs_master_build_binary" "$RUNNER_TEMP/$KVS_MASTER_BINARY"

      - name: Package ${{ env.KVS_MASTER_ASSET }}
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/package-$KVS_MASTER_BINARY"
          asset_path="$RUNNER_TEMP/$KVS_MASTER_ASSET"
          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 "$RUNNER_TEMP/$KVS_MASTER_BINARY" "$package_dir/$KVS_MASTER_BINARY"
          if file "$package_dir/$KVS_MASTER_BINARY" | grep -q 'ELF'; then
            strip "$package_dir/$KVS_MASTER_BINARY"
          fi
          file "$package_dir/$KVS_MASTER_BINARY"
          tar -C "$package_dir" -czf "$asset_path" "$KVS_MASTER_BINARY"
          archive_listing="$(tar -tzf "$asset_path")"
          if [ "$archive_listing" != "$KVS_MASTER_BINARY" ]; then
            echo "Expected $KVS_MASTER_ASSET to contain only root-level $KVS_MASTER_BINARY, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

      - name: Upload ${{ env.KVS_MASTER_ASSET }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KVS_MASTER_ASSET }}
          path: ${{ runner.temp }}/${{ env.KVS_MASTER_ASSET }}
          if-no-files-found: error

  package-rig-deploy:
    name: Package txing-rig-deploy
    runs-on: ubuntu-24.04-arm
    needs: metadata

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package ${{ env.RIG_DEPLOY_ASSET }}
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/package-txing-rig-deploy"
          asset_path="$RUNNER_TEMP/$RIG_DEPLOY_ASSET"
          rm -rf "$package_dir"
          install -d "$package_dir"
          install -m 755 rig/scripts/txing-rig-deploy "$package_dir/txing-rig-deploy"
          tar -C "$package_dir" -czf "$asset_path" txing-rig-deploy
          archive_listing="$(tar -tzf "$asset_path")"
          if [ "$archive_listing" != "txing-rig-deploy" ]; then
            echo "Expected $RIG_DEPLOY_ASSET to contain only root-level txing-rig-deploy, got:" >&2
            printf '%s\n' "$archive_listing" >&2
            exit 1
          fi

      - name: Upload ${{ env.RIG_DEPLOY_ASSET }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RIG_DEPLOY_ASSET }}
          path: ${{ runner.temp }}/${{ env.RIG_DEPLOY_ASSET }}
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-24.04-arm
    needs:
      - metadata
      - build-rust-binary
      - test-rig-workspace
      - build-lambda
      - build-kvs-master
      - package-rig-deploy

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
          RELEASE_TARGET: ${{ needs.metadata.outputs.release_target }}
          RELEASE_ASSETS_DIR: ${{ runner.temp }}/release-assets
        shell: bash
        run: |
          set -euo pipefail

          release_assets=(
            "$UNIT_DAEMON_ASSET"
            "$KVS_MASTER_ASSET"
            "$SPARKPLUG_MANAGER_ASSET"
            "$BLE_CONNECTIVITY_ASSET"
            "$AWS_CONNECTIVITY_ASSET"
            "$RIG_DEPLOY_ASSET"
            "$WITNESS_LAMBDA_ASSET"
            "$ENLIST_LAMBDA_ASSET"
            "$CLOUD_RIG_LAMBDA_ASSET"
            "$CLOUD_MCU_LAMBDA_ASSET"
          )

          release_asset_paths=()
          for asset in "${release_assets[@]}"; do
            asset_path="$RELEASE_ASSETS_DIR/$asset"
            if [ ! -s "$asset_path" ]; then
              echo "Missing release asset from build jobs: $asset_path" >&2
              find "$RELEASE_ASSETS_DIR" -maxdepth 2 -type f -print >&2 || true
              exit 1
            fi
            release_asset_paths+=("$asset_path")
          done

          notes_file="$(mktemp)"
          {
            echo "Txing release."
            echo
            echo "- Version: $VERSION"
            echo "- Tag: $TAG"
            echo "- Commit: $RELEASE_TARGET"
            echo "- Assets:"
            for asset in "${release_assets[@]}"; do
              echo "  - $asset"
            done
          } >"$notes_file"

          gh release create "$TAG" \
            "${release_asset_paths[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_TARGET" \
            --title "$TAG" \
            --notes-file "$notes_file" \
            --latest=true

      - name: Prune old project releases
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_RELEASES: ${{ env.RELEASE_RETENTION_COUNT }}
        shell: bash
        run: |
          set -euo pipefail

          release_list="$RUNNER_TEMP/project-releases.json"
          stale_tags="$RUNNER_TEMP/project-release-tags-to-delete.txt"

          gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --limit 1000 \
            --json tagName,publishedAt,createdAt \
            >"$release_list"

          python3 - "$KEEP_RELEASES" "$release_list" >"$stale_tags" <<'PY'
          import json
          import re
          import sys

          keep_releases = int(sys.argv[1])
          release_list_path = sys.argv[2]
          project_release_pattern = re.compile(
              r"^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$"
          )

          with open(release_list_path, encoding="utf-8") as release_file:
              releases = json.load(release_file)

          project_releases = []
          for release in releases:
              tag_name = release.get("tagName") or ""
              if not project_release_pattern.fullmatch(tag_name):
                  continue
              published_at = release.get("publishedAt") or release.get("createdAt") or ""
              project_releases.append((published_at, tag_name))

          project_releases.sort(reverse=True)
          for _, tag_name in project_releases[keep_releases:]:
              print(tag_name)
          PY

          if [ ! -s "$stale_tags" ]; then
            echo "No project releases older than the newest $KEEP_RELEASES to prune."
            exit 0
          fi

          while IFS= read -r old_tag; do
            [ -n "$old_tag" ] || continue
            echo "Deleting old project release and tag $old_tag"
            gh release delete "$old_tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          done <"$stale_tags"
