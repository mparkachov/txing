AWSTemplateFormatVersion: "2010-09-09"
Description: txing infrastructure stack (IoT gateway + web admin API/auth).

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Unique Cognito hosted UI domain prefix in this AWS region.
    AllowedPattern: "^[a-z0-9-]{1,63}$"
    ConstraintDescription: Use lowercase letters, numbers, and dashes only.
  AdminEmail:
    Type: String
    Description: Single admin email expected by the SPA (client-side check).
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: Must be a valid email address.
  LocalhostAppUrl:
    Type: String
    Default: http://localhost:5173
    Description: Vite local dev origin.
  LocalhostAltAppUrl:
    Type: String
    Default: http://127.0.0.1:5173
    Description: Alternate local dev origin.

Resources:
  TxingGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /txing/gw
      RetentionInDays: 30

  TxingGatewayLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Allows the gateway to write logs directly to /txing/gw.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GatewayCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/txing/gw
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/txing/gw:log-stream:*

  TxingThing:
    Type: AWS::IoT::Thing
    Properties:
      ThingName: txing

  TxingBoardVideoChannel:
    Type: AWS::KinesisVideo::SignalingChannel
    Properties:
      Name: txing-board-video
      Type: SINGLE_MASTER
      MessageTtlSeconds: 60

  TxingBoardVideoSenderManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the AWS principal used by the board video sender.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: BoardVideoMaster
            Effect: Allow
            Action:
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:GetIceServerConfig
              - kinesisvideo:ConnectAsMaster
            Resource: !GetAtt TxingBoardVideoChannel.Arn

  TxingGatewayPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: txing-gw-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Connect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/txing-*
          - Sid: ThingShadow
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/txing
          - Sid: ShadowPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/*
          - Sid: ShadowSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/*
          - Sid: CmdVelPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txing/board/cmd_vel
          - Sid: CmdVelSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txing/board/cmd_vel

  TxingWebAdminIotPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-web-admin-iot-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ShadowConnect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/${!cognito-identity.amazonaws.com:sub}
          - Sid: ShadowPublish
            Effect: Allow
            Action: iot:Publish
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update
          - Sid: ShadowSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/get/accepted
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/get/rejected
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/update/accepted
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/update/rejected
          - Sid: ShadowReceive
            Effect: Allow
            Action: iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get/accepted
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get/rejected
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update/accepted
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update/rejected
          - Sid: CmdVelPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txing/board/cmd_vel
          - Sid: CmdVelSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txing/board/cmd_vel

  TxingAdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: txing-shadow-admin
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "OFF"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        project: txing
        app: web-admin
        admin-email: !Ref AdminEmail

  TxingWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingWebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-txing-web
        Description: Signs CloudFront requests to the txing web bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  TxingWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: txing shadow admin SPA
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: txing-web-origin
            DomainName: !GetAtt TxingWebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt TxingWebOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: txing-web-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  TxingWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TxingWebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${TxingWebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${TxingWebDistribution}

  TxingAdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      ClientName: txing-shadow-admin-spa
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      LogoutURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  TxingAdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      Domain: !Ref CognitoDomainPrefix

  TxingAdminIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: txing_shadow_admin
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref TxingAdminUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${TxingAdminUserPool}
          ServerSideTokenCheck: true

  TxingAdminIdentityPoolAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role assumed by authenticated txing web admin identities.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TxingAdminIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: iot-shadow-direct-access-txing
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAttachWebIotPolicy
                Effect: Allow
                Action: iot:AttachPolicy
                Resource: "*"
              - Sid: ShadowConnect
                Effect: Allow
                Action: iot:Connect
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/${!cognito-identity.amazonaws.com:sub}
              - Sid: ShadowPublish
                Effect: Allow
                Action: iot:Publish
                Resource:
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update
              - Sid: ShadowSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource:
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/get/accepted
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/get/rejected
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/update/accepted
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/txing/shadow/update/rejected
              - Sid: ShadowReceive
                Effect: Allow
                Action: iot:Receive
                Resource:
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get/accepted
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/get/rejected
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update/accepted
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/txing/shadow/update/rejected
              - Sid: CmdVelPublishReceive
                Effect: Allow
                Action:
                  - iot:Publish
                  - iot:Receive
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txing/board/cmd_vel
              - Sid: CmdVelSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txing/board/cmd_vel
              - Sid: BoardVideoViewer
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                  - kinesisvideo:ConnectAsViewer
                Resource: !GetAtt TxingBoardVideoChannel.Arn

  TxingAdminIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TxingAdminIdentityPool
      Roles:
        authenticated: !GetAtt TxingAdminIdentityPoolAuthenticatedRole.Arn

Outputs:
  GatewayLogGroupName:
    Description: CloudWatch Logs group used by the gateway process.
    Value: !Ref TxingGatewayLogGroup
  GatewayLogGroupArn:
    Description: ARN of the CloudWatch Logs group used by the gateway process.
    Value: !GetAtt TxingGatewayLogGroup.Arn
  GatewayLogsManagedPolicyArn:
    Description: Attach this managed policy to the IAM principal used by gw.
    Value: !Ref TxingGatewayLogsManagedPolicy
  BoardVideoChannelArn:
    Description: ARN of the txing board KVS signaling channel.
    Value: !GetAtt TxingBoardVideoChannel.Arn
  BoardVideoChannelName:
    Description: Fixed signaling channel name for the phase-1 board video path.
    Value: txing-board-video
  BoardVideoSenderManagedPolicyArn:
    Description: Attach this managed policy to the AWS principal used by the board video sender.
    Value: !Ref TxingBoardVideoSenderManagedPolicy
  ThingName:
    Description: Fixed IoT Thing name used by the gateway.
    Value: !Ref TxingThing
  ThingArn:
    Description: ARN of the txing IoT Thing.
    Value: !GetAtt TxingThing.Arn
  ShadowUpdateTopic:
    Description: Reserved MQTT topic for Thing Shadow updates.
    Value: !Sub "$aws/things/${TxingThing}/shadow/update"
  PolicyName:
    Description: IoT policy to attach to gateway certificate.
    Value: !Ref TxingGatewayPolicy
  WebIotPolicyName:
    Description: IoT policy attached to authenticated Cognito identities for browser shadow access.
    Value: !Ref TxingWebAdminIotPolicy
  WebCognitoUserPoolId:
    Description: Cognito User Pool for txing web admin.
    Value: !Ref TxingAdminUserPool
  WebCognitoUserPoolClientId:
    Description: Cognito app client ID for the SPA.
    Value: !Ref TxingAdminUserPoolClient
  WebCognitoIdentityPoolId:
    Description: Cognito identity pool for direct AWS credentials in the SPA.
    Value: !Ref TxingAdminIdentityPool
  WebCognitoDomain:
    Description: Cognito hosted UI domain base URL.
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  WebAppBucketName:
    Description: S3 bucket storing the deployed SPA assets.
    Value: !Ref TxingWebBucket
  WebAppDistributionId:
    Description: CloudFront distribution serving the SPA.
    Value: !Ref TxingWebDistribution
  WebAppDistributionDomainName:
    Description: CloudFront domain name serving the SPA.
    Value: !GetAtt TxingWebDistribution.DomainName
  WebAppUrl:
    Description: Public URL for the deployed SPA.
    Value: !Sub https://${TxingWebDistribution.DomainName}/
  BoardVideoViewerUrl:
    Description: Public URL for the SPA video viewer route.
    Value: !Sub https://${TxingWebDistribution.DomainName}/video
  WebExpectedAdminEmail:
    Description: Email expected by SPA client-side check.
    Value: !Ref AdminEmail
