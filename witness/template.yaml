AWSTemplateFormatVersion: "2010-09-09"
Description: Sparkplug witness projection for txing

Parameters:
  WitnessRuleName:
    Type: String
    AllowedPattern: '^[a-zA-Z0-9_]+$'

Resources:
  TxingWitnessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}
      RetentionInDays: 30

  TxingWitnessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action: iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt TxingWitnessLogGroup.Arn
                  - !Sub ${TxingWitnessLogGroup.Arn}:*

  TxingSparkplugWitnessFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - TxingWitnessLogGroup
    Properties:
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      FunctionName: !Ref AWS::StackName
      Role: !GetAtt TxingWitnessRole.Arn
      Runtime: python3.12
      Handler: witness.sparkplug_witness.lambda_handler
      MemorySize: 256
      Timeout: 30
      Code: src

  TxingSparkplugWitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TxingSparkplugWitnessFunction
      Principal: iot.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:rule/${WitnessRuleName}

  TxingSparkplugWitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - TxingSparkplugWitnessInvokePermission
    Properties:
      RuleName: !Ref WitnessRuleName
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt TxingSparkplugWitnessFunction.Arn
