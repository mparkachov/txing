AWSTemplateFormatVersion: "2010-09-09"
Description: txing Sparkplug witness Lambda stack.

Parameters:
  EnvironmentStackName:
    Type: String
    Description: txing environment stack prefix, for example town.
  LambdaArtifactsBucketName:
    Type: String
    Description: S3 bucket containing release-built Lambda bootstrap zip artifacts.

Resources:
  WitnessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${EnvironmentStackName}-witness
      RetentionInDays: 14

  WitnessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentStackName}-witness
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action:
                  - iot:GetThingShadow
                  - iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeThings
                Effect: Allow
                Action: iot:DescribeThing
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt WitnessLogGroup.Arn
                  - !Sub ${WitnessLogGroup.Arn}:*

  WitnessFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - WitnessLogGroup
    Properties:
      FunctionName: !Sub ${EnvironmentStackName}-witness
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      Role: !GetAtt WitnessRole.Arn
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - arm64
      MemorySize: 128
      Timeout: 30
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: lambda/txing-witness-lambda/current/bootstrap.zip

  WitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WitnessFunction
      Principal: iot.amazonaws.com

  WitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - WitnessInvokePermission
    Properties:
      RuleName: !Join
        - "_"
        - - !Join
            - "_"
            - !Split ["-", !Ref EnvironmentStackName]
          - sparkplug_witness
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt WitnessFunction.Arn

  StackParameterWitnessFunctionName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /txing/stack/WitnessFunctionName
      Type: String
      Value: !Ref WitnessFunction

  StackParameterWitnessFunctionArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /txing/stack/WitnessFunctionArn
      Type: String
      Value: !GetAtt WitnessFunction.Arn

  StackParameterWitnessTopicRuleArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /txing/stack/WitnessTopicRuleArn
      Type: String
      Value: !GetAtt WitnessTopicRule.Arn

Outputs:
  WitnessFunctionName:
    Value: !Ref WitnessFunction
  WitnessFunctionArn:
    Value: !GetAtt WitnessFunction.Arn
  WitnessTopicRuleArn:
    Value: !GetAtt WitnessTopicRule.Arn
