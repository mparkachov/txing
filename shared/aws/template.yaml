AWSTemplateFormatVersion: "2010-09-09"
Description: txing base environment root stack.

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Unique Cognito hosted UI domain prefix in this AWS region.
    AllowedPattern: "^[a-z0-9-]{1,63}$"
  AdminEmail:
    Type: String
    Description: Single admin email expected by the SPA.
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  LocalhostAppUrl:
    Type: String
    Default: http://localhost:5173
  LocalhostAltAppUrl:
    Type: String
    Default: http://127.0.0.1:5173

Resources:
  BaseEnvironment:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: templates/base.yaml
      Parameters:
        CognitoDomainPrefix: !Ref CognitoDomainPrefix
        AdminEmail: !Ref AdminEmail
        LocalhostAppUrl: !Ref LocalhostAppUrl
        LocalhostAltAppUrl: !Ref LocalhostAltAppUrl

Outputs:
  RigLogGroupPattern:
    Value: !GetAtt BaseEnvironment.Outputs.RigLogGroupPattern
  DeviceLogGroupPattern:
    Value: !GetAtt BaseEnvironment.Outputs.DeviceLogGroupPattern
  RigLogsManagedPolicyArn:
    Value: !GetAtt BaseEnvironment.Outputs.RigLogsManagedPolicyArn
  PolicyName:
    Value: !GetAtt BaseEnvironment.Outputs.PolicyName
  WebIotPolicyName:
    Value: !GetAtt BaseEnvironment.Outputs.WebIotPolicyName
  WebCognitoUserPoolId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoUserPoolId
  WebCognitoUserPoolClientId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoUserPoolClientId
  WebCognitoIdentityPoolId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoIdentityPoolId
  WebCognitoDomain:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoDomain
  WebAppBucketName:
    Value: !GetAtt BaseEnvironment.Outputs.WebAppBucketName
  WebAppDistributionId:
    Value: !GetAtt BaseEnvironment.Outputs.WebAppDistributionId
  WebAppDistributionDomainName:
    Value: !GetAtt BaseEnvironment.Outputs.WebAppDistributionDomainName
  WebAppUrl:
    Value: !GetAtt BaseEnvironment.Outputs.WebAppUrl
  WebExpectedAdminEmail:
    Value: !GetAtt BaseEnvironment.Outputs.WebExpectedAdminEmail
  GreengrassArtifactsBucketName:
    Value: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName
