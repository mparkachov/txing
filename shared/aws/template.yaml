AWSTemplateFormatVersion: "2010-09-09"
Description: txing infrastructure stack (IoT gateway + web admin API/auth).

Parameters:
  CognitoDomainPrefix:
    Type: String
    Description: Unique Cognito hosted UI domain prefix in this AWS region.
    AllowedPattern: "^[a-z0-9-]{1,63}$"
    ConstraintDescription: Use lowercase letters, numbers, and dashes only.
  AdminEmail:
    Type: String
    Description: Single admin email expected by the SPA (client-side check).
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    ConstraintDescription: Must be a valid email address.
  LocalhostAppUrl:
    Type: String
    Default: http://localhost:5173
    Description: Vite local dev origin.
  LocalhostAltAppUrl:
    Type: String
    Default: http://127.0.0.1:5173
    Description: Alternate local dev origin.

Resources:
  TxingGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /town/rig/txing
      RetentionInDays: 30

  TxingGatewayLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Legacy direct-principal policy for CloudWatch logs and IoT registry/thing-group control-plane access.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GatewayCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/town/rig/txing
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/town/rig/txing:log-stream:*
          - Sid: GatewayThingRegistryReadWrite
            Effect: Allow
            Action:
              - iot:DescribeThing
              - iot:UpdateThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: GatewayThingGroupRead
            Effect: Allow
            Action:
              - iot:DescribeThingGroup
              - iot:ListThingsInThingGroup
              - iot:GetIndexingConfiguration
            Resource: "*"

  TxingRigRuntimeManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the town-scoped rig runtime IAM role used by rig MQTT/WSS and control-plane calls.
      ManagedPolicyName: !Sub ${AWS::StackName}-rig-runtime
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: RigMqttConnect
            Effect: Allow
            Action: iot:Connect
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/rig-*
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/rig-cmd-*
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/rig-log-*
          - Sid: RigShadowMqttTopics
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/*/shadow/*
          - Sid: RigShadowMqttTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/*/shadow/*
          - Sid: RigSparkplugMqttTopics
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/spBv1.0/*
          - Sid: RigSparkplugMqttTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/spBv1.0/*
          - Sid: RigMcpDiscoveryTopics
            Effect: Allow
            Action: iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/status
          - Sid: RigMcpDiscoveryTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txings/*/mcp/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txings/*/mcp/status
          - Sid: RigVideoDiscoveryTopics
            Effect: Allow
            Action: iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/video/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/video/status
          - Sid: RigVideoDiscoveryTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txings/*/video/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txings/*/video/status
          - Sid: RigThingShadowApi
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
              - iot:DeleteThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: RigThingRegistryReadWrite
            Effect: Allow
            Action:
              - iot:DescribeThing
              - iot:UpdateThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: RigThingGroupRead
            Effect: Allow
            Action:
              - iot:DescribeThingGroup
              - iot:ListThingsInThingGroup
              - iot:GetIndexingConfiguration
            Resource: "*"
          - Sid: RigDescribeEndpoint
            Effect: Allow
            Action: iot:DescribeEndpoint
            Resource: "*"
          - Sid: RigCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/town/rig/txing
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/town/rig/txing:log-stream:*

  TxingRigRuntimeRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Town-scoped runtime IAM role assumed by rig hosts for SigV4 MQTT/WSS and AWS control-plane access.
      RoleName: !Sub ${AWS::StackName}-rig-runtime
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref TxingRigRuntimeManagedPolicy

  TxingRigBootstrapManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the bootstrap IAM principal distributed to rigs; grants only sts:AssumeRole for the town rig runtime role.
      ManagedPolicyName: !Sub ${AWS::StackName}-rig-bootstrap-assume-role
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AssumeRigRuntimeRole
            Effect: Allow
            Action: sts:AssumeRole
            Resource: !GetAtt TxingRigRuntimeRole.Arn

  TxingRuntimeManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the device endpoint runtime IAM role used by registered device-side runtimes.
      ManagedPolicyName: !Sub ${AWS::StackName}-device-runtime
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DeviceMqttConnect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/device-*
          - Sid: DeviceShadowMqttTopics
            Effect: Allow
            Action:
              - iot:Publish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/$aws/things/*/shadow/*
          - Sid: DeviceShadowMqttTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/$aws/things/*/shadow/*
          - Sid: DeviceSparkplugMqttTopics
            Effect: Allow
            Action: iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/spBv1.0/*
          - Sid: DeviceSparkplugMqttTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/spBv1.0/*
          - Sid: DeviceMcpTopics
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/status
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/session/*/c2s
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/mcp/session/*/s2c
          - Sid: DeviceMcpTopicFilters
            Effect: Allow
            Action: iot:Subscribe
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/txings/*/mcp/session/*/c2s
          - Sid: DeviceVideoTopics
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource:
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/video/descriptor
              - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/txings/*/video/status
          - Sid: DeviceThingShadowApi
            Effect: Allow
            Action: iot:GetThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: DeviceDescribeThing
            Effect: Allow
            Action: iot:DescribeThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: DeviceDescribeEndpoint
            Effect: Allow
            Action: iot:DescribeEndpoint
            Resource: "*"
          - Sid: DeviceBoardVideoMaster
            Effect: Allow
            Action:
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:GetIceServerConfig
              - kinesisvideo:ConnectAsMaster
            Resource: "*"

  TxingRuntimeRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Town-scoped IAM role assumed by registered device endpoint hosts for SigV4-authenticated MQTT over WebSockets.
      RoleName: !Sub ${AWS::StackName}-device-runtime
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:root
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref TxingRuntimeManagedPolicy

  TxingBootstrapManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the bootstrap IAM principal distributed to device endpoint hosts; grants only sts:AssumeRole for the device runtime role.
      ManagedPolicyName: !Sub ${AWS::StackName}-device-bootstrap-assume-role
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AssumeDeviceRuntimeRole
            Effect: Allow
            Action: sts:AssumeRole
            Resource: !GetAtt TxingRuntimeRole.Arn

  TxingTownThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: town
      ThingTypeProperties:
        ThingTypeDescription: Registered txing town type
        SearchableAttributes:
          - name

  TxingRigThingType:
    Type: AWS::IoT::ThingType
    Properties:
      ThingTypeName: rig
      ThingTypeProperties:
        ThingTypeDescription: Registered txing rig type
        SearchableAttributes:
          - name
          - town

  TxingWitnessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${AWS::StackName}-sparkplug-witness
      RetentionInDays: 30

  TxingWitnessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action: iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:DescribeLogStreams
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt TxingWitnessLogGroup.Arn
                  - !Sub ${TxingWitnessLogGroup.Arn}:*

  TxingSparkplugWitnessFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - TxingWitnessLogGroup
    Properties:
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      FunctionName: !Sub ${AWS::StackName}-sparkplug-witness
      Role: !GetAtt TxingWitnessRole.Arn
      Runtime: python3.12
      Handler: aws.sparkplug_witness.lambda_handler
      MemorySize: 256
      Timeout: 30
      Code: python/src

  TxingSparkplugWitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TxingSparkplugWitnessFunction
      Principal: iot.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:rule/${AWS::StackName}SparkplugWitness

  TxingSparkplugWitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - TxingSparkplugWitnessInvokePermission
    Properties:
      RuleName: !Sub ${AWS::StackName}SparkplugWitness
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt TxingSparkplugWitnessFunction.Arn

  TxingBoardVideoSenderManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Attach to the AWS principal used by per-device board video senders.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: BoardVideoMaster
            Effect: Allow
            Action:
              - kinesisvideo:DescribeSignalingChannel
              - kinesisvideo:GetSignalingChannelEndpoint
              - kinesisvideo:GetIceServerConfig
              - kinesisvideo:ConnectAsMaster
            Resource: "*"

  TxingGatewayPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: town-rig-device-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Connect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Sid: ThingShadow
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: MessagingPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Sid: MessagingSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*

  TxingWebAdminIotPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyName: !Sub ${AWS::StackName}-web-admin-iot-policy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*

  TxingAdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: txing-shadow-admin
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "OFF"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        project: txing
        app: web-admin
        admin-email: !Ref AdminEmail

  TxingWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingWebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-txing-web
        Description: Signs CloudFront requests to the txing web bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  TxingWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: txing shadow admin SPA
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: txing-web-origin
            DomainName: !GetAtt TxingWebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt TxingWebOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: txing-web-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  TxingWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TxingWebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${TxingWebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${TxingWebDistribution}

  TxingAdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      ClientName: txing-shadow-admin-spa
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      LogoutURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  TxingAdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      Domain: !Ref CognitoDomainPrefix

  TxingAdminIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: txing_shadow_admin
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref TxingAdminUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${TxingAdminUserPool}
          ServerSideTokenCheck: true

  TxingAdminIdentityPoolAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role assumed by authenticated txing web admin identities.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TxingAdminIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: iot-shadow-direct-access-txing
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAttachWebIotPolicy
                Effect: Allow
                Action: iot:AttachPolicy
                Resource: "*"
              - Sid: AllowDescribeIotEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: AllowThingCatalogListing
                Effect: Allow
                Action:
                  - iot:ListThingGroups
                  - iot:DescribeThing
                  - iot:DescribeThingGroup
                  - iot:ListThingsInThingGroup
                  - iot:SearchIndex
                Resource: "*"
              - Sid: AllowDirectThingShadowReads
                Effect: Allow
                Action:
                  - iot:GetThingShadow
                Resource: "*"
              - Sid: ShadowConnect
                Effect: Allow
                Action: iot:Connect
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
              - Sid: IoTPublishReceive
                Effect: Allow
                Action:
                  - iot:Publish
                  - iot:RetainPublish
                  - iot:Receive
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
              - Sid: IoTSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
              - Sid: BoardVideoViewer
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                  - kinesisvideo:ConnectAsViewer
                Resource: "*"

  TxingAdminIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TxingAdminIdentityPool
      Roles:
        authenticated: !GetAtt TxingAdminIdentityPoolAuthenticatedRole.Arn

Outputs:
  RigLogGroupName:
    Description: CloudWatch Logs group used by the rig process.
    Value: !Ref TxingGatewayLogGroup
  RigLogGroupArn:
    Description: ARN of the CloudWatch Logs group used by the rig process.
    Value: !GetAtt TxingGatewayLogGroup.Arn
  RigLogsManagedPolicyArn:
    Description: Legacy direct-principal managed policy for CloudWatch logs and IoT registry/thing-group access.
    Value: !Ref TxingGatewayLogsManagedPolicy
  RigRuntimeRoleArn:
    Description: Town-scoped IAM role to assume from rigs for SigV4-authenticated MQTT over WebSockets and AWS control-plane access.
    Value: !GetAtt TxingRigRuntimeRole.Arn
  RigRuntimeRoleName:
    Description: Name of the town-scoped rig runtime IAM role.
    Value: !Ref TxingRigRuntimeRole
  RigRuntimeManagedPolicyArn:
    Description: Managed policy attached to the town-scoped rig runtime role.
    Value: !Ref TxingRigRuntimeManagedPolicy
  RigBootstrapManagedPolicyArn:
    Description: Attach this managed policy to the bootstrap IAM principal whose access keys are distributed to rigs.
    Value: !Ref TxingRigBootstrapManagedPolicy
  DeviceRuntimeRoleArn:
    Description: Town-scoped IAM role to assume from registered device endpoint hosts for SigV4-authenticated MQTT over WebSockets.
    Value: !GetAtt TxingRuntimeRole.Arn
  DeviceRuntimeRoleName:
    Description: Name of the town-scoped device runtime IAM role.
    Value: !Ref TxingRuntimeRole
  DeviceRuntimeManagedPolicyArn:
    Description: Managed policy attached to the registered device runtime role.
    Value: !Ref TxingRuntimeManagedPolicy
  DeviceBootstrapManagedPolicyArn:
    Description: Attach this managed policy to the bootstrap IAM principal whose access keys are distributed to device endpoint hosts.
    Value: !Ref TxingBootstrapManagedPolicy
  BoardVideoSenderManagedPolicyArn:
    Description: Attach this managed policy to the AWS principal used by the board video sender.
    Value: !Ref TxingBoardVideoSenderManagedPolicy
  PolicyName:
    Description: IoT policy retained for certificate-authenticated board or legacy device clients.
    Value: !Ref TxingGatewayPolicy
  WebIotPolicyName:
    Description: IoT policy attached to authenticated Cognito identities for browser shadow access.
    Value: !Ref TxingWebAdminIotPolicy
  WebCognitoUserPoolId:
    Description: Cognito User Pool for txing web admin.
    Value: !Ref TxingAdminUserPool
  WebCognitoUserPoolClientId:
    Description: Cognito app client ID for the SPA.
    Value: !Ref TxingAdminUserPoolClient
  WebCognitoIdentityPoolId:
    Description: Cognito identity pool for direct AWS credentials in the SPA.
    Value: !Ref TxingAdminIdentityPool
  WebCognitoDomain:
    Description: Cognito hosted UI domain base URL.
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  WebAppBucketName:
    Description: S3 bucket storing the deployed SPA assets.
    Value: !Ref TxingWebBucket
  WebAppDistributionId:
    Description: CloudFront distribution serving the SPA.
    Value: !Ref TxingWebDistribution
  WebAppDistributionDomainName:
    Description: CloudFront domain name serving the SPA.
    Value: !GetAtt TxingWebDistribution.DomainName
  WebAppUrl:
    Description: Public URL for the deployed SPA.
    Value: !Sub https://${TxingWebDistribution.DomainName}/
  WebExpectedAdminEmail:
    Description: Email expected by SPA client-side check.
    Value: !Ref AdminEmail
