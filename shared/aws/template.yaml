AWSTemplateFormatVersion: "2010-09-09"
Description: txing base environment root stack.

Parameters:
  StackCognitoDomainPrefix:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /txing/stack/CognitoDomainPrefix
    Description: SSM parameter containing the unique Cognito hosted UI domain prefix in this AWS region.
  StackAdminEmail:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /txing/stack/AdminEmail
    Description: SSM parameter containing the single admin email expected by the SPA.
  LocalhostAppUrl:
    Type: String
    Default: http://localhost:5173
  LocalhostAltAppUrl:
    Type: String
    Default: http://127.0.0.1:5173
  StackWebAppUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /txing/stack/WebAppUrl
    Description: SSM parameter containing the Cloudflare Pages production web app URL without a trailing slash.
  LambdaArtifactsBucketName:
    Type: String
    Description: S3 bucket containing release-built Lambda bootstrap zip artifacts.
  GithubRepository:
    Type: String
    Default: mparkachov/txing
    AllowedPattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
    Description: Public GitHub repository containing txing release assets.
  AwsAdminCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged AWS admin Lambda code.
  AwsAdminCodeS3Key:
    Type: String
    Description: S3 key containing the packaged AWS admin Lambda code.

Resources:
  BaseEnvironment:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: templates/base.yaml
      Parameters:
        CognitoDomainPrefix: !Ref StackCognitoDomainPrefix
        AdminEmail: !Ref StackAdminEmail
        LocalhostAppUrl: !Ref LocalhostAppUrl
        LocalhostAltAppUrl: !Ref LocalhostAltAppUrl
        WebAppUrl: !Ref StackWebAppUrl
        LambdaArtifactsBucketName: !Ref LambdaArtifactsBucketName
        AwsAdminCodeS3Bucket: !Ref AwsAdminCodeS3Bucket
        AwsAdminCodeS3Key: !Ref AwsAdminCodeS3Key

  TownTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn: BaseEnvironment
    Properties:
      TemplateURL: templates/types/town.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  RaspiTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - TownTypeCatalog
    Properties:
      TemplateURL: templates/types/raspi.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  RaspiUnitTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - RaspiTypeCatalog
    Properties:
      TemplateURL: templates/types/raspi-unit.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  RaspiWeatherTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - RaspiTypeCatalog
    Properties:
      TemplateURL: templates/types/raspi-weather.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  RaspiPowerTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - RaspiTypeCatalog
    Properties:
      TemplateURL: templates/types/raspi-power.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  CloudTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - TownTypeCatalog
    Properties:
      TemplateURL: templates/types/cloud.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken

  CloudMcuTypeCatalog:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - CloudTypeCatalog
    Properties:
      TemplateURL: templates/types/cloud-mcu.yaml
      Parameters:
        TypeCatalogServiceToken: !GetAtt BaseEnvironment.Outputs.CustomResourceServiceToken
        LambdaArtifactsBucketName: !Ref LambdaArtifactsBucketName

  RigRuntimeLayer:
    Type: AWS::CloudFormation::Stack
    DependsOn: BaseEnvironment
    Properties:
      TemplateURL: templates/rig.yaml
      Parameters:
        GreengrassArtifactsBucketName: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName

  DeviceRuntimeLayer:
    Type: AWS::CloudFormation::Stack
    DependsOn: BaseEnvironment
    Properties:
      TemplateURL: templates/device.yaml

  EnlistLayer:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - BaseEnvironment
      - TownTypeCatalog
      - RaspiTypeCatalog
      - RaspiUnitTypeCatalog
      - RaspiWeatherTypeCatalog
      - RaspiPowerTypeCatalog
      - CloudTypeCatalog
      - CloudMcuTypeCatalog
    Properties:
      TemplateURL: templates/enlist.yaml
      Parameters:
        AwsAdminCodeS3Bucket: !Ref AwsAdminCodeS3Bucket
        AwsAdminCodeS3Key: !Ref AwsAdminCodeS3Key

  AwsPublishReleaseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/aws-publish-release
      RetentionInDays: 14

  AwsPublishReleaseRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Publishes txing release artifacts to Lambda and Greengrass.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: release-publisher
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReleasePublisherLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt AwsPublishReleaseLogGroup.Arn
                  - !Sub ${AwsPublishReleaseLogGroup.Arn}:*
              - Sid: ListLambdaArtifacts
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                Resource: !Sub arn:${AWS::Partition}:s3:::${LambdaArtifactsBucketName}
                Condition:
                  StringLike:
                    s3:prefix:
                      - lambda/*
              - Sid: WriteLambdaArtifacts
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${LambdaArtifactsBucketName}/lambda/*
              - Sid: ListGreengrassArtifacts
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                Resource: !Sub
                  - arn:${AWS::Partition}:s3:::${BucketName}
                  - BucketName: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName
                Condition:
                  StringLike:
                    s3:prefix:
                      - artifacts/*
              - Sid: WriteGreengrassArtifacts
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                Resource: !Sub
                  - arn:${AWS::Partition}:s3:::${BucketName}/artifacts/*
                  - BucketName: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName
              - Sid: UpdateReleaseLambdas
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:txing-witness-lambda
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:txing-cloud-rig-lambda
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:txing-cloud-mcu-lambda
              - Sid: PublishGreengrassComponents
                Effect: Allow
                Action:
                  - greengrass:CreateComponentVersion
                  - greengrass:CreateDeployment
                Resource: "*"
              - Sid: ManageGreengrassThingGroups
                Effect: Allow
                Action:
                  - iot:CreateThingGroup
                  - iot:DescribeThingGroup
                  - iot:DescribeEndpoint
                Resource: "*"
              - Sid: CreateGreengrassDeploymentJobs
                Effect: Allow
                Action:
                  - iot:CancelJob
                  - iot:CreateJob
                  - iot:DescribeJob
                  - iot:UpdateJob
                Resource:
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thinggroup/txing-rig-type-*
                  - !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:job/*

  AwsPublishReleaseFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - AwsPublishReleaseLogGroup
      - BaseEnvironment
    Properties:
      FunctionName: aws-publish-release
      Description: Publishes txing release artifacts to Lambda and Greengrass.
      Runtime: python3.12
      Handler: aws_admin.publish_release.handler.lambda_handler
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key
      Role: !GetAtt AwsPublishReleaseRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TXING_GITHUB_REPOSITORY: !Ref GithubRepository
          TXING_LAMBDA_ARTIFACT_BUCKET: !Ref LambdaArtifactsBucketName
          TXING_GREENGRASS_ARTIFACT_BUCKET: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName

Outputs:
  RigLogGroupPattern:
    Value: !GetAtt BaseEnvironment.Outputs.RigLogGroupPattern
  DeviceLogGroupPattern:
    Value: !GetAtt BaseEnvironment.Outputs.DeviceLogGroupPattern
  RigLogsManagedPolicyArn:
    Value: !GetAtt BaseEnvironment.Outputs.RigLogsManagedPolicyArn
  PolicyName:
    Value: !GetAtt BaseEnvironment.Outputs.PolicyName
  WebIotPolicyName:
    Value: !GetAtt BaseEnvironment.Outputs.WebIotPolicyName
  WebCognitoUserPoolId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoUserPoolId
  WebCognitoUserPoolClientId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoUserPoolClientId
  WebCognitoIdentityPoolId:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoIdentityPoolId
  WebCognitoDomain:
    Value: !GetAtt BaseEnvironment.Outputs.WebCognitoDomain
  WebAppUrl:
    Value: !GetAtt BaseEnvironment.Outputs.WebAppUrl
  WebExpectedAdminEmail:
    Value: !GetAtt BaseEnvironment.Outputs.WebExpectedAdminEmail
  GreengrassArtifactsBucketName:
    Value: !GetAtt BaseEnvironment.Outputs.GreengrassArtifactsBucketName
  ReleasePublisherFunctionName:
    Value: !Ref AwsPublishReleaseFunction
  ReleasePublisherFunctionArn:
    Value: !GetAtt AwsPublishReleaseFunction.Arn
  RigRuntimeRoleArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.RigRuntimeRoleArn
  RigRuntimeRoleName:
    Value: !GetAtt RigRuntimeLayer.Outputs.RigRuntimeRoleName
  RigRuntimeManagedPolicyArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.RigRuntimeManagedPolicyArn
  GreengrassRigTokenExchangeManagedPolicyArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.GreengrassRigTokenExchangeManagedPolicyArn
  GreengrassTokenExchangeRoleArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.GreengrassTokenExchangeRoleArn
  GreengrassTokenExchangeRoleName:
    Value: !GetAtt RigRuntimeLayer.Outputs.GreengrassTokenExchangeRoleName
  GreengrassTokenExchangeRoleAlias:
    Value: !GetAtt RigRuntimeLayer.Outputs.GreengrassTokenExchangeRoleAlias
  GreengrassTokenExchangeRoleAliasArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.GreengrassTokenExchangeRoleAliasArn
  RigBootstrapManagedPolicyArn:
    Value: !GetAtt RigRuntimeLayer.Outputs.RigBootstrapManagedPolicyArn
  DeviceRuntimeRoleArn:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.DeviceRuntimeRoleArn
  DeviceRuntimeRoleName:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.DeviceRuntimeRoleName
  DeviceRuntimeManagedPolicyArn:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.DeviceRuntimeManagedPolicyArn
  DeviceBootstrapManagedPolicyArn:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.DeviceBootstrapManagedPolicyArn
  BoardVideoSenderManagedPolicyArn:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.BoardVideoSenderManagedPolicyArn
  DeviceDaemonIotPolicyName:
    Value: !GetAtt DeviceRuntimeLayer.Outputs.DeviceDaemonIotPolicyName
  EnlistFunctionName:
    Value: !GetAtt EnlistLayer.Outputs.EnlistFunctionName
  EnlistFunctionArn:
    Value: !GetAtt EnlistLayer.Outputs.EnlistFunctionArn
  WitnessFunctionName:
    Value: !GetAtt BaseEnvironment.Outputs.WitnessFunctionName
  WitnessFunctionArn:
    Value: !GetAtt BaseEnvironment.Outputs.WitnessFunctionArn
  CloudRigRuntimeFunctionName:
    Value: !GetAtt CloudMcuTypeCatalog.Outputs.CloudRigRuntimeFunctionName
  CloudMcuRuntimeFunctionName:
    Value: !GetAtt CloudMcuTypeCatalog.Outputs.CloudMcuRuntimeFunctionName
  CloudMcuTickQueueUrl:
    Value: !GetAtt CloudMcuTypeCatalog.Outputs.CloudMcuTickQueueUrl
  CloudRigRuntimeScheduleRuleName:
    Value: !GetAtt CloudMcuTypeCatalog.Outputs.CloudRigRuntimeScheduleRuleName
  CloudMcuDcmdTopicRuleArn:
    Value: !GetAtt CloudMcuTypeCatalog.Outputs.CloudMcuDcmdTopicRuleArn
