AWSTemplateFormatVersion: "2010-09-09"
Description: txing-cloud-mcu-lambda runtime.

Parameters:
  LambdaArtifactsBucketName:
    Type: String
    Description: S3 bucket containing release-built Lambda bootstrap zip artifacts.
  CloudMcuTickQueueArn:
    Type: String
  CloudMcuClusterName:
    Type: String
  CloudMcuTaskDefinitionArn:
    Type: String
  CloudMcuSubnetId:
    Type: String
  CloudMcuTaskSecurityGroupId:
    Type: String
  CloudMcuTaskExecutionRoleArn:
    Type: String
  CloudMcuTaskRoleArn:
    Type: String

Resources:
  CloudMcuRuntimeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/txing-cloud-mcu-lambda
      RetentionInDays: 14

  CloudMcuRuntimeFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes cloud MCU SQS tick and REDCON reconciliation.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cloud-mcu-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CloudMcuRuntimeLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt CloudMcuRuntimeLogGroup.Arn
                  - !Sub ${CloudMcuRuntimeLogGroup.Arn}:*
              - Sid: CloudMcuRuntimeSparkplug
                Effect: Allow
                Action: iot:Publish
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/spBv1.0/*
              - Sid: CloudMcuRuntimeShadows
                Effect: Allow
                Action:
                  - iot:GetThingShadow
                  - iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: CloudMcuRuntimeDescribeThing
                Effect: Allow
                Action: iot:DescribeThing
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: CloudMcuRuntimeDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: CloudMcuRuntimeSqs
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Ref CloudMcuTickQueueArn
              - Sid: CloudMcuRuntimeEcs
                Effect: Allow
                Action:
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RunTask
                  - ecs:StopTask
                Resource: "*"
              - Sid: CloudMcuRuntimeTagRunTasks
                Effect: Allow
                Action: ecs:TagResource
                Resource: !Sub arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task/${CloudMcuClusterName}/*
                Condition:
                  StringEquals:
                    ecs:CreateAction: RunTask
              - Sid: CloudMcuRuntimePassTaskRoles
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Ref CloudMcuTaskExecutionRoleArn
                  - !Ref CloudMcuTaskRoleArn

  CloudMcuRuntimeFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - CloudMcuRuntimeLogGroup
    Properties:
      FunctionName: txing-cloud-mcu-lambda
      Description: SQS and Sparkplug DCMD runtime for cloud MCU devices.
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: lambda/txing-cloud-mcu-lambda/current/bootstrap.zip
      Role: !GetAtt CloudMcuRuntimeFunctionRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          CLOUD_MCU_ECS_CLUSTER: !Ref CloudMcuClusterName
          CLOUD_MCU_ECS_TASK_DEFINITION: !Ref CloudMcuTaskDefinitionArn
          CLOUD_MCU_ECS_SUBNETS: !Ref CloudMcuSubnetId
          CLOUD_MCU_ECS_SECURITY_GROUPS: !Ref CloudMcuTaskSecurityGroupId

  CloudMcuTickEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 1
      EventSourceArn: !Ref CloudMcuTickQueueArn
      FunctionName: !Ref CloudMcuRuntimeFunction

  CloudMcuDcmdTopicRule:
    Type: AWS::IoT::TopicRule
    Properties:
      TopicRulePayload:
        AwsIotSqlVersion: "2016-03-23"
        RuleDisabled: false
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/DCMD/+/+'
          WHERE startswith(topic(5), 'cloud-mcu-')
        Actions:
          - Lambda:
              FunctionArn: !GetAtt CloudMcuRuntimeFunction.Arn

  CloudMcuDcmdRulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CloudMcuRuntimeFunction
      Principal: iot.amazonaws.com
      SourceArn: !GetAtt CloudMcuDcmdTopicRule.Arn

Outputs:
  CloudMcuRuntimeFunctionName:
    Value: !Ref CloudMcuRuntimeFunction
  CloudMcuRuntimeFunctionArn:
    Value: !GetAtt CloudMcuRuntimeFunction.Arn
  CloudMcuDcmdTopicRuleArn:
    Value: !GetAtt CloudMcuDcmdTopicRule.Arn
