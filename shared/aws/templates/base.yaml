AWSTemplateFormatVersion: "2010-09-09"
Description: txing base AWS environment.

Parameters:
  CognitoDomainPrefix:
    Type: String
    AllowedPattern: "^[a-z0-9-]{1,63}$"
  AdminEmail:
    Type: String
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  LocalhostAppUrl:
    Type: String
  LocalhostAltAppUrl:
    Type: String

Resources:
  TxingGreengrassArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingGatewayLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Dynamic txing CloudWatch logs and IoT fleet registry access.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GatewayCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutRetentionPolicy
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*:log-stream:*
          - Sid: GatewayThingRegistryReadWrite
            Effect: Allow
            Action:
              - iot:DescribeThing
              - iot:UpdateThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: GatewayFleetRegistryRead
            Effect: Allow
            Action:
              - iot:GetIndexingConfiguration
              - iot:SearchIndex
            Resource: "*"

  TxingGatewayPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Connect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Sid: ThingShadow
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: MessagingPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Sid: MessagingSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: GreengrassControlPlane
            Effect: Allow
            Action: greengrass:*
            Resource: "*"
          - Sid: GreengrassTokenExchangeAssumeRole
            Effect: Allow
            Action: iot:AssumeRoleWithCertificate
            Resource: "*"

  TxingWebAdminIotPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: AllowDirectThingShadowReads
            Effect: Allow
            Action: iot:GetThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*

  TxingStackCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Handles txing base-stack custom resources for cleanup and Fleet Indexing.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: stack-cleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CleanupLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: EmptyDisposableBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !GetAtt TxingGreengrassArtifactsBucket.Arn
                  - !GetAtt TxingWebBucket.Arn
              - Sid: DeleteDisposableBucketObjects
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub "${TxingGreengrassArtifactsBucket.Arn}/*"
                  - !Sub "${TxingWebBucket.Arn}/*"
              - Sid: DetachOutOfBandIotPolicyTargets
                Effect: Allow
                Action:
                  - iot:DetachPolicy
                  - iot:ListTargetsForPolicy
                Resource: "*"
              - Sid: ConfigureIotFleetIndexing
                Effect: Allow
                Action:
                  - iot:UpdateIndexingConfiguration
                  - iot:GetIndexingConfiguration
                Resource: "*"
              - Sid: ManageTxingThingTypes
                Effect: Allow
                Action:
                  - iot:CreateThingType
                  - iot:DescribeThingType
                  - iot:UpdateThingType
                  - iot:DeprecateThingType
                Resource: "*"
              - Sid: ManageTxingTypeCatalog
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParametersByPath
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/txing/*

  TxingStackCleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: CloudFormation custom resources for txing cleanup and Fleet Indexing.
      Role: !GetAtt TxingStackCleanupRole.Arn
      Runtime: python3.12
      Handler: index.lambda_handler
      MemorySize: 128
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import logging
          import time
          import urllib.request

          import boto3


          LOGGER = logging.getLogger(__name__)
          LOGGER.setLevel(logging.INFO)
          s3 = boto3.client("s3")
          iot = boto3.client("iot")
          ssm = boto3.client("ssm")
          IOT_FLEET_INDEXING_PHYSICAL_ID = "txing-iot-fleet-indexing"
          IOT_FLEET_INDEXING_CUSTOM_FIELDS = [
              "attributes.name",
              "attributes.kind",
              "attributes.townId",
              "attributes.rigId",
          ]


          def _send_response(
              event,
              context,
              status,
              data=None,
              reason=None,
              physical_resource_id=None,
          ):
              body = json.dumps(
                  {
                      "Status": status,
                      "Reason": reason or f"See CloudWatch log stream: {context.log_stream_name}",
                      "PhysicalResourceId": physical_resource_id
                      or event.get("PhysicalResourceId")
                      or f"{event['StackId']}/{event['LogicalResourceId']}",
                      "StackId": event["StackId"],
                      "RequestId": event["RequestId"],
                      "LogicalResourceId": event["LogicalResourceId"],
                      "NoEcho": False,
                      "Data": data or {},
                  }
              ).encode("utf-8")
              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  method="PUT",
                  headers={
                      "content-type": "",
                      "content-length": str(len(body)),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  response.read()


          def _error_code(error):
              return getattr(error, "response", {}).get("Error", {}).get("Code")


          def _ignore_missing_bucket(error):
              return _error_code(error) in {"NoSuchBucket", "404", "NotFound"}


          def _delete_objects(bucket, objects):
              if not objects:
                  return 0
              deleted = 0
              for offset in range(0, len(objects), 1000):
                  chunk = objects[offset : offset + 1000]
                  response = s3.delete_objects(
                      Bucket=bucket,
                      Delete={"Objects": chunk, "Quiet": True},
                  )
                  errors = response.get("Errors", [])
                  if errors:
                      raise RuntimeError(f"Failed to delete objects from {bucket}: {errors}")
                  deleted += len(chunk)
              return deleted


          def _empty_bucket(bucket):
              deleted = 0
              try:
                  paginator = s3.get_paginator("list_object_versions")
                  for page in paginator.paginate(Bucket=bucket):
                      versioned_objects = [
                          {"Key": item["Key"], "VersionId": item["VersionId"]}
                          for item in page.get("Versions", [])
                      ]
                      delete_markers = [
                          {"Key": item["Key"], "VersionId": item["VersionId"]}
                          for item in page.get("DeleteMarkers", [])
                      ]
                      deleted += _delete_objects(bucket, versioned_objects + delete_markers)

                  object_paginator = s3.get_paginator("list_objects_v2")
                  for page in object_paginator.paginate(Bucket=bucket):
                      objects = [{"Key": item["Key"]} for item in page.get("Contents", [])]
                      deleted += _delete_objects(bucket, objects)
              except Exception as error:
                  if _ignore_missing_bucket(error):
                      return {"deletedObjects": deleted, "missing": True}
                  raise
              return {"deletedObjects": deleted, "missing": False}


          def _detach_policy_targets(policy_name):
              targets = []
              marker = None
              while True:
                  request = {
                      "policyName": policy_name,
                      "pageSize": 250,
                  }
                  if marker:
                      request["marker"] = marker
                  try:
                      response = iot.list_targets_for_policy(**request)
                  except Exception as error:
                      if _error_code(error) in {"ResourceNotFoundException", "NotFoundException"}:
                          return {"detachedTargets": 0, "missing": True}
                      raise
                  targets.extend(response.get("targets", []))
                  marker = response.get("nextMarker")
                  if not marker:
                      break

              detached = 0
              for target in sorted(set(targets)):
                  try:
                      iot.detach_policy(policyName=policy_name, target=target)
                  except Exception as error:
                      code = _error_code(error)
                      message = str(error).lower()
                      if code not in {"ResourceNotFoundException", "NotFoundException"} and "not attached" not in message:
                          raise
                  detached += 1
              return {"detachedTargets": detached, "missing": False}


          def _fleet_indexing_configuration():
              return {
                  "thingIndexingMode": "REGISTRY",
                  "thingConnectivityIndexingMode": "STATUS",
                  "customFields": [
                      {"name": name, "type": "String"}
                      for name in IOT_FLEET_INDEXING_CUSTOM_FIELDS
                  ],
              }


          def _fleet_indexing_matches(configuration):
              fields = {
                  item.get("name"): item.get("type")
                  for item in configuration.get("customFields", [])
              }
              return (
                  configuration.get("thingIndexingMode") == "REGISTRY"
                  and configuration.get("thingConnectivityIndexingMode") == "STATUS"
                  and all(fields.get(name) == "String" for name in IOT_FLEET_INDEXING_CUSTOM_FIELDS)
              )


          def _configure_iot_fleet_indexing():
              expected = _fleet_indexing_configuration()
              iot.update_indexing_configuration(thingIndexingConfiguration=expected)
              deadline = time.monotonic() + 120
              while True:
                  response = iot.get_indexing_configuration()
                  configuration = response.get("thingIndexingConfiguration", {})
                  if _fleet_indexing_matches(configuration):
                      return {
                          "thingIndexingMode": configuration.get("thingIndexingMode"),
                          "thingConnectivityIndexingMode": configuration.get(
                              "thingConnectivityIndexingMode"
                          ),
                          "customFields": ",".join(IOT_FLEET_INDEXING_CUSTOM_FIELDS),
                      }
                  if time.monotonic() >= deadline:
                      raise TimeoutError("Timed out waiting for AWS IoT fleet indexing configuration")
                  time.sleep(3)


          def _as_string_list(value):
              if value is None:
                  return []
              if isinstance(value, str):
                  return [item.strip() for item in value.split(",") if item.strip()]
              if isinstance(value, list):
                  return [str(item).strip() for item in value if str(item).strip()]
              raise TypeError(f"Expected list or comma-separated string, got {type(value).__name__}")


          def _thing_type_properties(properties):
              return {
                  "thingTypeDescription": properties.get("ThingTypeDescription", ""),
                  "searchableAttributes": _as_string_list(properties.get("SearchableAttributes")),
              }


          def _ensure_thing_type(properties):
              thing_type_name = properties["ThingTypeName"]
              thing_type_properties = _thing_type_properties(properties)
              try:
                  iot.create_thing_type(
                      thingTypeName=thing_type_name,
                      thingTypeProperties=thing_type_properties,
                  )
                  return "created"
              except Exception as error:
                  if _error_code(error) != "ResourceAlreadyExistsException":
                      raise

              description = iot.describe_thing_type(thingTypeName=thing_type_name)
              metadata = description.get("thingTypeMetadata", {})
              if metadata.get("deprecated"):
                  iot.deprecate_thing_type(
                      thingTypeName=thing_type_name,
                      undoDeprecate=True,
                  )
              current_properties = description.get("thingTypeProperties", {})
              if (
                  current_properties.get("thingTypeDescription", "")
                  == thing_type_properties["thingTypeDescription"]
                  and sorted(current_properties.get("searchableAttributes", []))
                  == sorted(thing_type_properties["searchableAttributes"])
              ):
                  return "existing"
              iot.update_thing_type(
                  thingTypeName=thing_type_name,
                  thingTypeProperties=thing_type_properties,
              )
              return "updated"


          def _catalog_parameter_name(base_path, leaf_name):
              base = str(base_path).rstrip("/")
              leaf = str(leaf_name).strip("/")
              if not base.startswith("/txing/") and base != "/txing":
                  raise ValueError(f"Type catalog path must be under /txing: {base_path!r}")
              if not leaf:
                  raise ValueError("Type catalog leaf name must not be empty")
              return f"{base}/{leaf}"


          def _put_type_catalog_parameters(properties):
              base_path = properties["CatalogBasePath"]
              catalog_parameters = properties.get("CatalogParameters", {})
              if not isinstance(catalog_parameters, dict):
                  raise TypeError("CatalogParameters must be a map")

              try:
                  ssm.delete_parameter(Name=str(base_path).rstrip("/"))
              except Exception as error:
                  if _error_code(error) != "ParameterNotFound":
                      raise

              written = []
              for leaf_name, value in sorted(catalog_parameters.items()):
                  name = _catalog_parameter_name(base_path, leaf_name)
                  ssm.put_parameter(
                      Name=name,
                      Type="String",
                      Value=str(value),
                      Overwrite=True,
                  )
                  written.append(name)
              return written


          def _delete_type_catalog_parameters(properties):
              base_path = properties.get("CatalogBasePath")
              if not base_path:
                  return {"deletedParameters": 0}

              normalized_base_path = str(base_path).rstrip("/")
              if not normalized_base_path.startswith("/txing/") and normalized_base_path != "/txing":
                  raise ValueError(f"Type catalog path must be under /txing: {base_path!r}")

              parameter_names = set()
              next_token = None
              while True:
                  request = {
                      "Path": normalized_base_path,
                      "Recursive": True,
                      "WithDecryption": False,
                  }
                  if next_token:
                      request["NextToken"] = next_token
                  response = ssm.get_parameters_by_path(**request)
                  for parameter in response.get("Parameters", []):
                      name = parameter.get("Name")
                      if isinstance(name, str):
                          parameter_names.add(name)
                  next_token = response.get("NextToken")
                  if not next_token:
                      break
              parameter_names.add(normalized_base_path)

              deleted = 0
              for name in sorted(parameter_names, reverse=True):
                  try:
                      ssm.delete_parameter(Name=name)
                  except Exception as error:
                      if _error_code(error) != "ParameterNotFound":
                          raise
                  else:
                      deleted += 1
              return {"deletedParameters": deleted, "thingTypeDeletion": "skipped"}


          def _ensure_type_catalog(properties):
              thing_type_status = _ensure_thing_type(properties)
              written_parameters = _put_type_catalog_parameters(properties)
              return {
                  "thingType": properties["ThingTypeName"],
                  "thingTypeStatus": thing_type_status,
                  "catalogBasePath": properties["CatalogBasePath"],
                  "catalogParameterCount": len(written_parameters),
              }


          def _handle_create_or_update(properties):
              cleanup_type = properties.get("CleanupType")
              if cleanup_type == "IotFleetIndexing":
                  return _configure_iot_fleet_indexing()
              if cleanup_type == "TypeCatalog":
                  return _ensure_type_catalog(properties)
              if cleanup_type in {"S3Bucket", "IotPolicyAttachments"}:
                  return {}
              raise ValueError(f"Unsupported CleanupType: {cleanup_type!r}")


          def _handle_delete(properties):
              cleanup_type = properties.get("CleanupType")
              if cleanup_type == "S3Bucket":
                  return _empty_bucket(properties["BucketName"])
              if cleanup_type == "IotPolicyAttachments":
                  results = {}
                  for policy_name in properties.get("PolicyNames", []):
                      results[policy_name] = _detach_policy_targets(policy_name)
                  return {"policies": results}
              if cleanup_type == "IotFleetIndexing":
                  return {"skipped": True}
              if cleanup_type == "TypeCatalog":
                  return _delete_type_catalog_parameters(properties)
              raise ValueError(f"Unsupported CleanupType: {cleanup_type!r}")


          def lambda_handler(event, context):
              LOGGER.info("event=%s", json.dumps(event, sort_keys=True))
              properties = event.get("ResourceProperties", {})
              physical_resource_id = properties.get("PhysicalResourceId")
              if properties.get("CleanupType") == "IotFleetIndexing":
                  physical_resource_id = physical_resource_id or IOT_FLEET_INDEXING_PHYSICAL_ID
              if properties.get("CleanupType") == "TypeCatalog":
                  physical_resource_id = physical_resource_id or (
                      "txing-type-catalog-" + properties["ThingTypeName"]
                  )
              try:
                  data = {}
                  if event.get("RequestType") == "Delete":
                      data = _handle_delete(properties)
                  else:
                      data = _handle_create_or_update(properties)
                  _send_response(
                      event,
                      context,
                      "SUCCESS",
                      data,
                      physical_resource_id=physical_resource_id,
                  )
              except Exception as error:
                  LOGGER.exception("custom cleanup failed")
                  _send_response(
                      event,
                      context,
                      "FAILED",
                      reason=str(error),
                      physical_resource_id=physical_resource_id,
                  )

  TxingIotFleetIndexing:
    Type: Custom::TxingIotFleetIndexing
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: IotFleetIndexing
      PhysicalResourceId: txing-iot-fleet-indexing

  TxingGreengrassArtifactsBucketCleanup:
    Type: Custom::TxingS3BucketCleanup
    DependsOn:
      - TxingGreengrassArtifactsBucket
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: S3Bucket
      BucketName: !Ref TxingGreengrassArtifactsBucket

  TxingWebBucketCleanup:
    Type: Custom::TxingS3BucketCleanup
    DependsOn:
      - TxingWebBucket
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: S3Bucket
      BucketName: !Ref TxingWebBucket

  TxingIotPolicyAttachmentCleanup:
    Type: Custom::TxingIotPolicyAttachmentCleanup
    DependsOn:
      - TxingGatewayPolicy
      - TxingWebAdminIotPolicy
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: IotPolicyAttachments
      PolicyNames:
        - !Ref TxingGatewayPolicy
        - !Ref TxingWebAdminIotPolicy

  TxingWitnessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action: iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  TxingSparkplugWitnessFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      Role: !GetAtt TxingWitnessRole.Arn
      Runtime: python3.12
      Handler: witness.sparkplug_witness.lambda_handler
      MemorySize: 256
      Timeout: 30
      Code: ../../../witness/src

  TxingSparkplugWitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TxingSparkplugWitnessFunction
      Principal: iot.amazonaws.com

  TxingSparkplugWitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - TxingSparkplugWitnessInvokePermission
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt TxingSparkplugWitnessFunction.Arn

  TxingAdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "OFF"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        project: txing
        app: web-admin
        admin-email: !Ref AdminEmail

  TxingWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingWebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-txing-web
        Description: Signs CloudFront requests to the txing web bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  TxingWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: txing shadow admin SPA
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: txing-web-origin
            DomainName: !GetAtt TxingWebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt TxingWebOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: txing-web-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  TxingWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TxingWebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${TxingWebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${TxingWebDistribution}

  TxingAdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      ClientName: txing-shadow-admin-spa
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      LogoutURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  TxingAdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      Domain: !Ref CognitoDomainPrefix

  TxingAdminIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: txing_shadow_admin
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref TxingAdminUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${TxingAdminUserPool}
          ServerSideTokenCheck: true

  TxingAdminIdentityPoolAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role assumed by authenticated txing web admin identities.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TxingAdminIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: iot-shadow-direct-access-txing
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAttachWebIotPolicy
                Effect: Allow
                Action: iot:AttachPolicy
                Resource: "*"
              - Sid: AllowDescribeIotEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: AllowThingCatalogListing
                Effect: Allow
                Action:
                  - iot:DescribeThing
                  - iot:SearchIndex
                Resource: "*"
              - Sid: AllowDirectThingShadowReads
                Effect: Allow
                Action: iot:GetThingShadow
                Resource: "*"
              - Sid: ShadowConnect
                Effect: Allow
                Action: iot:Connect
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
              - Sid: IoTPublishReceive
                Effect: Allow
                Action:
                  - iot:Publish
                  - iot:RetainPublish
                  - iot:Receive
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
              - Sid: IoTSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
              - Sid: BoardVideoViewer
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                  - kinesisvideo:ConnectAsViewer
                Resource: "*"

  TxingAdminIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TxingAdminIdentityPool
      Roles:
        authenticated: !GetAtt TxingAdminIdentityPoolAuthenticatedRole.Arn

Outputs:
  RigLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>
  DeviceLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>/<device-thing-name>
  RigLogsManagedPolicyArn:
    Value: !Ref TxingGatewayLogsManagedPolicy
  PolicyName:
    Value: !Ref TxingGatewayPolicy
  WebIotPolicyName:
    Value: !Ref TxingWebAdminIotPolicy
  WebCognitoUserPoolId:
    Value: !Ref TxingAdminUserPool
  WebCognitoUserPoolClientId:
    Value: !Ref TxingAdminUserPoolClient
  WebCognitoIdentityPoolId:
    Value: !Ref TxingAdminIdentityPool
  WebCognitoDomain:
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  WebAppBucketName:
    Value: !Ref TxingWebBucket
  WebAppDistributionId:
    Value: !Ref TxingWebDistribution
  WebAppDistributionDomainName:
    Value: !GetAtt TxingWebDistribution.DomainName
  WebAppUrl:
    Value: !Sub https://${TxingWebDistribution.DomainName}/
  WebExpectedAdminEmail:
    Value: !Ref AdminEmail
  GreengrassArtifactsBucketName:
    Value: !Ref TxingGreengrassArtifactsBucket
  CustomResourceServiceToken:
    Value: !GetAtt TxingStackCleanupFunction.Arn
