AWSTemplateFormatVersion: "2010-09-09"
Description: txing base AWS environment.

Parameters:
  CognitoDomainPrefix:
    Type: String
    AllowedPattern: "^[a-z0-9-]{1,63}$"
  AdminEmail:
    Type: String
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  LocalhostAppUrl:
    Type: String
  LocalhostAltAppUrl:
    Type: String

Resources:
  TxingGreengrassArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingGatewayLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Dynamic txing CloudWatch logs and IoT registry/thing-group access.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GatewayCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutRetentionPolicy
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*:log-stream:*
          - Sid: GatewayThingRegistryReadWrite
            Effect: Allow
            Action:
              - iot:DescribeThing
              - iot:UpdateThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: GatewayThingGroupRead
            Effect: Allow
            Action:
              - iot:DescribeThingGroup
              - iot:ListThingsInThingGroup
              - iot:ListThings
              - iot:GetIndexingConfiguration
              - iot:SearchIndex
            Resource: "*"

  TxingGatewayPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Connect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Sid: ThingShadow
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: MessagingPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Sid: MessagingSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: GreengrassControlPlane
            Effect: Allow
            Action: greengrass:*
            Resource: "*"
          - Sid: GreengrassTokenExchangeAssumeRole
            Effect: Allow
            Action: iot:AssumeRoleWithCertificate
            Resource: "*"

  TxingWebAdminIotPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: AllowDirectThingShadowReads
            Effect: Allow
            Action: iot:GetThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*

  TxingStackCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Deletes disposable txing stack data and out-of-band IoT policy attachments during stack deletion.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: stack-cleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CleanupLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: EmptyDisposableBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !GetAtt TxingGreengrassArtifactsBucket.Arn
                  - !GetAtt TxingWebBucket.Arn
              - Sid: DeleteDisposableBucketObjects
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub "${TxingGreengrassArtifactsBucket.Arn}/*"
                  - !Sub "${TxingWebBucket.Arn}/*"
              - Sid: DetachOutOfBandIotPolicyTargets
                Effect: Allow
                Action:
                  - iot:DetachPolicy
                  - iot:ListTargetsForPolicy
                Resource: "*"

  TxingStackCleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: CloudFormation custom resource cleanup for disposable txing resources.
      Role: !GetAtt TxingStackCleanupRole.Arn
      Runtime: python3.12
      Handler: index.lambda_handler
      MemorySize: 128
      Timeout: 300
      Code:
        ZipFile: |
          import json
          import logging
          import urllib.request

          import boto3


          LOGGER = logging.getLogger(__name__)
          LOGGER.setLevel(logging.INFO)
          s3 = boto3.client("s3")
          iot = boto3.client("iot")


          def _send_response(event, context, status, data=None, reason=None):
              body = json.dumps(
                  {
                      "Status": status,
                      "Reason": reason or f"See CloudWatch log stream: {context.log_stream_name}",
                      "PhysicalResourceId": event.get("PhysicalResourceId")
                      or f"{event['StackId']}/{event['LogicalResourceId']}",
                      "StackId": event["StackId"],
                      "RequestId": event["RequestId"],
                      "LogicalResourceId": event["LogicalResourceId"],
                      "NoEcho": False,
                      "Data": data or {},
                  }
              ).encode("utf-8")
              request = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  method="PUT",
                  headers={
                      "content-type": "",
                      "content-length": str(len(body)),
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  response.read()


          def _error_code(error):
              return getattr(error, "response", {}).get("Error", {}).get("Code")


          def _ignore_missing_bucket(error):
              return _error_code(error) in {"NoSuchBucket", "404", "NotFound"}


          def _delete_objects(bucket, objects):
              if not objects:
                  return 0
              deleted = 0
              for offset in range(0, len(objects), 1000):
                  chunk = objects[offset : offset + 1000]
                  response = s3.delete_objects(
                      Bucket=bucket,
                      Delete={"Objects": chunk, "Quiet": True},
                  )
                  errors = response.get("Errors", [])
                  if errors:
                      raise RuntimeError(f"Failed to delete objects from {bucket}: {errors}")
                  deleted += len(chunk)
              return deleted


          def _empty_bucket(bucket):
              deleted = 0
              try:
                  paginator = s3.get_paginator("list_object_versions")
                  for page in paginator.paginate(Bucket=bucket):
                      versioned_objects = [
                          {"Key": item["Key"], "VersionId": item["VersionId"]}
                          for item in page.get("Versions", [])
                      ]
                      delete_markers = [
                          {"Key": item["Key"], "VersionId": item["VersionId"]}
                          for item in page.get("DeleteMarkers", [])
                      ]
                      deleted += _delete_objects(bucket, versioned_objects + delete_markers)

                  object_paginator = s3.get_paginator("list_objects_v2")
                  for page in object_paginator.paginate(Bucket=bucket):
                      objects = [{"Key": item["Key"]} for item in page.get("Contents", [])]
                      deleted += _delete_objects(bucket, objects)
              except Exception as error:
                  if _ignore_missing_bucket(error):
                      return {"deletedObjects": deleted, "missing": True}
                  raise
              return {"deletedObjects": deleted, "missing": False}


          def _detach_policy_targets(policy_name):
              targets = []
              marker = None
              while True:
                  request = {
                      "policyName": policy_name,
                      "pageSize": 250,
                  }
                  if marker:
                      request["marker"] = marker
                  try:
                      response = iot.list_targets_for_policy(**request)
                  except Exception as error:
                      if _error_code(error) in {"ResourceNotFoundException", "NotFoundException"}:
                          return {"detachedTargets": 0, "missing": True}
                      raise
                  targets.extend(response.get("targets", []))
                  marker = response.get("nextMarker")
                  if not marker:
                      break

              detached = 0
              for target in sorted(set(targets)):
                  try:
                      iot.detach_policy(policyName=policy_name, target=target)
                  except Exception as error:
                      code = _error_code(error)
                      message = str(error).lower()
                      if code not in {"ResourceNotFoundException", "NotFoundException"} and "not attached" not in message:
                          raise
                  detached += 1
              return {"detachedTargets": detached, "missing": False}


          def _handle_delete(properties):
              cleanup_type = properties.get("CleanupType")
              if cleanup_type == "S3Bucket":
                  return _empty_bucket(properties["BucketName"])
              if cleanup_type == "IotPolicyAttachments":
                  results = {}
                  for policy_name in properties.get("PolicyNames", []):
                      results[policy_name] = _detach_policy_targets(policy_name)
                  return {"policies": results}
              raise ValueError(f"Unsupported CleanupType: {cleanup_type!r}")


          def lambda_handler(event, context):
              LOGGER.info("event=%s", json.dumps(event, sort_keys=True))
              try:
                  data = {}
                  if event.get("RequestType") == "Delete":
                      data = _handle_delete(event.get("ResourceProperties", {}))
                  _send_response(event, context, "SUCCESS", data)
              except Exception as error:
                  LOGGER.exception("custom cleanup failed")
                  _send_response(event, context, "FAILED", reason=str(error))

  TxingGreengrassArtifactsBucketCleanup:
    Type: Custom::TxingS3BucketCleanup
    DependsOn:
      - TxingGreengrassArtifactsBucket
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: S3Bucket
      BucketName: !Ref TxingGreengrassArtifactsBucket

  TxingWebBucketCleanup:
    Type: Custom::TxingS3BucketCleanup
    DependsOn:
      - TxingWebBucket
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: S3Bucket
      BucketName: !Ref TxingWebBucket

  TxingIotPolicyAttachmentCleanup:
    Type: Custom::TxingIotPolicyAttachmentCleanup
    DependsOn:
      - TxingGatewayPolicy
      - TxingWebAdminIotPolicy
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: IotPolicyAttachments
      PolicyNames:
        - !Ref TxingGatewayPolicy
        - !Ref TxingWebAdminIotPolicy

  TxingWitnessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action: iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  TxingSparkplugWitnessFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      Role: !GetAtt TxingWitnessRole.Arn
      Runtime: python3.12
      Handler: witness.sparkplug_witness.lambda_handler
      MemorySize: 256
      Timeout: 30
      Code: ../../../witness/src

  TxingSparkplugWitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TxingSparkplugWitnessFunction
      Principal: iot.amazonaws.com

  TxingSparkplugWitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - TxingSparkplugWitnessInvokePermission
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt TxingSparkplugWitnessFunction.Arn

  TxingAdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "OFF"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        project: txing
        app: web-admin
        admin-email: !Ref AdminEmail

  TxingWebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingWebOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-txing-web
        Description: Signs CloudFront requests to the txing web bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  TxingWebDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: txing shadow admin SPA
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: txing-web-origin
            DomainName: !GetAtt TxingWebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt TxingWebOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: txing-web-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  TxingWebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TxingWebBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${TxingWebBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${TxingWebDistribution}

  TxingAdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      ClientName: txing-shadow-admin-spa
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      LogoutURLs:
        - !Sub https://${TxingWebDistribution.DomainName}/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  TxingAdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      Domain: !Ref CognitoDomainPrefix

  TxingAdminIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: txing_shadow_admin
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref TxingAdminUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${TxingAdminUserPool}
          ServerSideTokenCheck: true

  TxingAdminIdentityPoolAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role assumed by authenticated txing web admin identities.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TxingAdminIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: iot-shadow-direct-access-txing
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAttachWebIotPolicy
                Effect: Allow
                Action: iot:AttachPolicy
                Resource: "*"
              - Sid: AllowDescribeIotEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: AllowThingCatalogListing
                Effect: Allow
                Action:
                  - iot:ListThingGroups
                  - iot:DescribeThing
                  - iot:DescribeThingGroup
                  - iot:ListThingsInThingGroup
                  - iot:SearchIndex
                Resource: "*"
              - Sid: AllowDirectThingShadowReads
                Effect: Allow
                Action: iot:GetThingShadow
                Resource: "*"
              - Sid: ShadowConnect
                Effect: Allow
                Action: iot:Connect
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
              - Sid: IoTPublishReceive
                Effect: Allow
                Action:
                  - iot:Publish
                  - iot:RetainPublish
                  - iot:Receive
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
              - Sid: IoTSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
              - Sid: BoardVideoViewer
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                  - kinesisvideo:ConnectAsViewer
                Resource: "*"

  TxingAdminIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TxingAdminIdentityPool
      Roles:
        authenticated: !GetAtt TxingAdminIdentityPoolAuthenticatedRole.Arn

Outputs:
  RigLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>
  DeviceLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>/<device-thing-name>
  RigLogsManagedPolicyArn:
    Value: !Ref TxingGatewayLogsManagedPolicy
  PolicyName:
    Value: !Ref TxingGatewayPolicy
  WebIotPolicyName:
    Value: !Ref TxingWebAdminIotPolicy
  WebCognitoUserPoolId:
    Value: !Ref TxingAdminUserPool
  WebCognitoUserPoolClientId:
    Value: !Ref TxingAdminUserPoolClient
  WebCognitoIdentityPoolId:
    Value: !Ref TxingAdminIdentityPool
  WebCognitoDomain:
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  WebAppBucketName:
    Value: !Ref TxingWebBucket
  WebAppDistributionId:
    Value: !Ref TxingWebDistribution
  WebAppDistributionDomainName:
    Value: !GetAtt TxingWebDistribution.DomainName
  WebAppUrl:
    Value: !Sub https://${TxingWebDistribution.DomainName}/
  WebExpectedAdminEmail:
    Value: !Ref AdminEmail
  GreengrassArtifactsBucketName:
    Value: !Ref TxingGreengrassArtifactsBucket
