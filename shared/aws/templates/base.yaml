AWSTemplateFormatVersion: "2010-09-09"
Description: txing base AWS environment.

Parameters:
  CognitoDomainPrefix:
    Type: String
    AllowedPattern: "^[a-z0-9-]{1,63}$"
  AdminEmail:
    Type: String
    AllowedPattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  LocalhostAppUrl:
    Type: String
  LocalhostAltAppUrl:
    Type: String
  WebAppUrl:
    Type: String
    Default: https://office.txing.dev
    Description: Cloudflare Pages production web app URL without a trailing slash.
    AllowedPattern: "^https://.+[^/]$"
  LambdaArtifactsBucketName:
    Type: String
    Description: S3 bucket containing release-built Lambda bootstrap zip artifacts.
  AwsAdminCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged AWS admin Lambda code.
  AwsAdminCodeS3Key:
    Type: String
    Description: S3 key containing the packaged AWS admin Lambda code.

Resources:
  TxingGreengrassArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  TxingGatewayLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Dynamic txing CloudWatch logs and IoT fleet registry access.
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: GatewayCloudWatchLogsWrite
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:DescribeLogStreams
              - logs:PutRetentionPolicy
              - logs:PutLogEvents
            Resource:
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*
              - !Sub arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:txing/*:log-stream:*
          - Sid: GatewayThingRegistryReadWrite
            Effect: Allow
            Action:
              - iot:DescribeThing
              - iot:UpdateThing
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: GatewayFleetRegistryRead
            Effect: Allow
            Action:
              - iot:GetIndexingConfiguration
              - iot:SearchIndex
            Resource: "*"

  TxingGatewayPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: Connect
            Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Sid: ThingShadow
            Effect: Allow
            Action:
              - iot:GetThingShadow
              - iot:UpdateThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
          - Sid: MessagingPublishReceive
            Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Sid: MessagingSubscribe
            Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: GreengrassControlPlane
            Effect: Allow
            Action:
              - greengrass:CreateComponentVersion
              - greengrass:CreateDeployment
              - greengrass:DescribeComponent
              - greengrass:GetComponent
              - greengrass:GetDeployment
              - greengrass:ListThingGroupsForCoreDevice
              - greengrass:ResolveComponentCandidates
              - greengrass:ListComponentVersions
              - greengrass:ListDeployments
            Resource: "*"
          - Sid: GreengrassTokenExchangeAssumeRole
            Effect: Allow
            Action: iot:AssumeRoleWithCertificate
            Resource: "*"

  TxingWebAdminIotPolicy:
    Type: AWS::IoT::Policy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: iot:Connect
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
          - Effect: Allow
            Action:
              - iot:Publish
              - iot:RetainPublish
              - iot:Receive
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
          - Effect: Allow
            Action: iot:Subscribe
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
          - Sid: AllowDirectThingShadowReads
            Effect: Allow
            Action: iot:GetThingShadow
            Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*

  TxingStackCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Handles txing base-stack custom resources for cleanup and Fleet Indexing.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: stack-cleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CleanupLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: EmptyDisposableBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !GetAtt TxingGreengrassArtifactsBucket.Arn
              - Sid: DeleteDisposableBucketObjects
                Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource:
                  - !Sub "${TxingGreengrassArtifactsBucket.Arn}/*"
              - Sid: DetachOutOfBandIotPolicyTargets
                Effect: Allow
                Action:
                  - iot:DetachPolicy
                  - iot:ListTargetsForPolicy
                Resource: "*"
              - Sid: ConfigureIotFleetIndexing
                Effect: Allow
                Action:
                  - iot:UpdateIndexingConfiguration
                  - iot:GetIndexingConfiguration
                Resource: "*"
              - Sid: ManageTxingThingTypes
                Effect: Allow
                Action:
                  - iot:CreateThingType
                  - iot:DescribeThingType
                  - iot:UpdateThingType
                  - iot:DeprecateThingType
                Resource: "*"
              - Sid: ManageTxingTypeCatalog
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParametersByPath
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/txing/*
              - Sid: DescribeCloudFormationStack
                Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: "*"

  AwsCleanStackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/aws-clean-stack
      RetentionInDays: 14

  TxingStackCleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Legacy service-token bridge for pre-aws-clean-stack custom resources.
      Role: !GetAtt TxingStackCleanupRole.Arn
      Runtime: python3.12
      Handler: aws_admin.clean_stack.lambda_handler
      MemorySize: 128
      Timeout: 300
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key

  AwsCleanStackFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - AwsCleanStackLogGroup
    Properties:
      FunctionName: aws-clean-stack
      Description: CloudFormation custom resources for txing cleanup and Fleet Indexing.
      Role: !GetAtt TxingStackCleanupRole.Arn
      Runtime: python3.12
      Handler: aws_admin.clean_stack.lambda_handler
      MemorySize: 128
      Timeout: 300
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key

  TxingIotFleetIndexing:
    Type: Custom::TxingIotFleetIndexing
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: IotFleetIndexing
      PhysicalResourceId: txing-iot-fleet-indexing

  TxingGreengrassArtifactsBucketCleanup:
    Type: Custom::TxingS3BucketCleanup
    DependsOn:
      - TxingGreengrassArtifactsBucket
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: S3Bucket
      BucketName: !Ref TxingGreengrassArtifactsBucket

  TxingIotPolicyAttachmentCleanup:
    Type: Custom::TxingIotPolicyAttachmentCleanup
    DependsOn:
      - TxingGatewayPolicy
      - TxingWebAdminIotPolicy
    Properties:
      ServiceToken: !GetAtt TxingStackCleanupFunction.Arn
      CleanupType: IotPolicyAttachments
      PolicyNames:
        - !Ref TxingGatewayPolicy
        - !Ref TxingWebAdminIotPolicy

  TxingWitnessRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Executes the Sparkplug witness projection from MQTT topics into named shadows.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: sparkplug-witness
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WitnessShadowUpdate
                Effect: Allow
                Action:
                  - iot:GetThingShadow
                  - iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessSearchIndex
                Effect: Allow
                Action: iot:SearchIndex
                Resource: "*"
              - Sid: WitnessDescribeThings
                Effect: Allow
                Action: iot:DescribeThing
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: WitnessDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: WitnessCloudWatchLogsWrite
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt TxingWitnessLogGroup.Arn
                  - !Sub ${TxingWitnessLogGroup.Arn}:*

  TxingWitnessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/txing-witness-lambda
      RetentionInDays: 14

  TxingSparkplugWitnessFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - TxingWitnessLogGroup
    Properties:
      FunctionName: txing-witness-lambda
      Description: Projects Sparkplug MQTT state into sparkplug named shadows.
      Role: !GetAtt TxingWitnessRole.Arn
      Runtime: provided.al2023
      Handler: bootstrap
      Architectures:
        - arm64
      MemorySize: 128
      Timeout: 30
      Code:
        S3Bucket: !Ref LambdaArtifactsBucketName
        S3Key: lambda/txing-witness-lambda/current/bootstrap.zip

  TxingSparkplugWitnessInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TxingSparkplugWitnessFunction
      Principal: iot.amazonaws.com

  TxingSparkplugWitnessTopicRule:
    Type: AWS::IoT::TopicRule
    DependsOn:
      - TxingSparkplugWitnessInvokePermission
    Properties:
      TopicRulePayload:
        RuleDisabled: false
        AwsIotSqlVersion: "2016-03-23"
        Sql: >-
          SELECT topic() AS mqttTopic, encode(*, 'base64') AS payloadBase64, timestamp() AS observedAt
          FROM 'spBv1.0/+/+/#'
        Actions:
          - Lambda:
              FunctionArn: !GetAtt TxingSparkplugWitnessFunction.Arn

  TxingAdminUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      MfaConfiguration: "OFF"
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        project: txing
        app: web-admin
        admin-email: !Ref AdminEmail

  TxingAdminUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      ClientName: txing-shadow-admin-spa
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub "${WebAppUrl}/"
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      LogoutURLs:
        - !Sub "${WebAppUrl}/"
        - https://txing.dev/
        - !Sub "${LocalhostAppUrl}/"
        - !Sub "${LocalhostAltAppUrl}/"
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      ExplicitAuthFlows:
        - ALLOW_REFRESH_TOKEN_AUTH

  TxingAdminUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref TxingAdminUserPool
      Domain: !Ref CognitoDomainPrefix

  TxingAdminIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: txing_shadow_admin
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref TxingAdminUserPoolClient
          ProviderName: !Sub cognito-idp.${AWS::Region}.amazonaws.com/${TxingAdminUserPool}
          ServerSideTokenCheck: true

  TxingAdminIdentityPoolAuthenticatedRole:
    Type: AWS::IAM::Role
    Properties:
      Description: IAM role assumed by authenticated txing web admin identities.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TxingAdminIdentityPool
              ForAnyValue:StringLike:
                cognito-identity.amazonaws.com:amr: authenticated
      Policies:
        - PolicyName: iot-shadow-direct-access-txing
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAttachWebIotPolicy
                Effect: Allow
                Action: iot:AttachPolicy
                Resource: "*"
              - Sid: AllowDescribeIotEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: AllowThingCatalogListing
                Effect: Allow
                Action:
                  - iot:DescribeThing
                  - iot:SearchIndex
                Resource: "*"
              - Sid: AllowDirectThingShadowReads
                Effect: Allow
                Action: iot:GetThingShadow
                Resource: "*"
              - Sid: ShadowConnect
                Effect: Allow
                Action: iot:Connect
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:client/*
              - Sid: IoTPublishReceive
                Effect: Allow
                Action:
                  - iot:Publish
                  - iot:RetainPublish
                  - iot:Receive
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topic/*
              - Sid: IoTSubscribe
                Effect: Allow
                Action: iot:Subscribe
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:topicfilter/*
              - Sid: BoardVideoViewer
                Effect: Allow
                Action:
                  - kinesisvideo:DescribeSignalingChannel
                  - kinesisvideo:GetSignalingChannelEndpoint
                  - kinesisvideo:GetIceServerConfig
                  - kinesisvideo:ConnectAsViewer
                Resource: "*"

  TxingAdminIdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TxingAdminIdentityPool
      Roles:
        authenticated: !GetAtt TxingAdminIdentityPoolAuthenticatedRole.Arn

Outputs:
  RigLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>
  DeviceLogGroupPattern:
    Value: txing/<town-thing-name>/<rig-thing-name>/<device-thing-name>
  RigLogsManagedPolicyArn:
    Value: !Ref TxingGatewayLogsManagedPolicy
  PolicyName:
    Value: !Ref TxingGatewayPolicy
  WebIotPolicyName:
    Value: !Ref TxingWebAdminIotPolicy
  WebCognitoUserPoolId:
    Value: !Ref TxingAdminUserPool
  WebCognitoUserPoolClientId:
    Value: !Ref TxingAdminUserPoolClient
  WebCognitoIdentityPoolId:
    Value: !Ref TxingAdminIdentityPool
  WebCognitoDomain:
    Value: !Sub https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
  WebAppUrl:
    Value: !Sub "${WebAppUrl}/"
  WebExpectedAdminEmail:
    Value: !Ref AdminEmail
  GreengrassArtifactsBucketName:
    Value: !Ref TxingGreengrassArtifactsBucket
  CustomResourceServiceToken:
    Value: !GetAtt AwsCleanStackFunction.Arn
  WitnessFunctionName:
    Value: !Ref TxingSparkplugWitnessFunction
  WitnessFunctionArn:
    Value: !GetAtt TxingSparkplugWitnessFunction.Arn
