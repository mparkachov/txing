AWSTemplateFormatVersion: "2010-09-09"
Description: txing Raspberry Pi rig type catalog.

Parameters:
  TypeCatalogServiceToken:
    Type: String

Resources:
  RaspiTypeCatalog:
    Type: Custom::TxingTypeCatalog
    Properties:
      ServiceToken: !Ref TypeCatalogServiceToken
      CleanupType: TypeCatalog
      PhysicalResourceId: txing-type-catalog-raspi
      ThingTypeName: raspi
      ThingTypeDescription: txing Raspberry Pi rig type
      SearchableAttributes:
        - name
        - townId
      CatalogBasePath: /txing/town/raspi
      CatalogParameters:
        kind: rigType
        schemaVersion: "1.0"
        thingType: raspi
        rigType: raspi
        displayName: Raspberry Pi Rig
        defaultName: server
        capabilities: sparkplug
        requiredAttributes: name,shortId,townId
        searchableAttributes: name,townId
        hostServices: bluetooth.service
