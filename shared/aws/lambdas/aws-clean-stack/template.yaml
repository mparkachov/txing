AWSTemplateFormatVersion: "2010-09-09"
Description: txing CloudFormation custom-resource Lambda stack.

Parameters:
  EnvironmentStackName:
    Type: String
    Description: txing environment stack prefix, for example town.
  AwsAdminCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged AWS admin Lambda code.
  AwsAdminCodeS3Key:
    Type: String
    Description: S3 key containing the packaged AWS admin Lambda code.

Resources:
  CleanStackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${EnvironmentStackName}-aws-clean-stack
      RetentionInDays: 14

  CleanStackRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentStackName}-aws-clean-stack
      Description: Handles txing base-stack custom resources for cleanup and Fleet Indexing.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: stack-cleanup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: CleanupLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Sid: ConfigureIotFleetIndexing
                Effect: Allow
                Action:
                  - iot:UpdateIndexingConfiguration
                  - iot:GetIndexingConfiguration
                Resource: "*"
              - Sid: ManageTxingThingTypes
                Effect: Allow
                Action:
                  - iot:CreateThingType
                  - iot:DescribeThingType
                  - iot:UpdateThingType
                  - iot:DeprecateThingType
                Resource: "*"
              - Sid: ManageTxingTypeCatalog
                Effect: Allow
                Action:
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:DeleteParameters
                  - ssm:GetParametersByPath
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/txing/*
              - Sid: DescribeCloudFormationStack
                Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: "*"

  CleanStackFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - CleanStackLogGroup
    Properties:
      FunctionName: !Sub ${EnvironmentStackName}-aws-clean-stack
      Description: CloudFormation custom resources for txing cleanup and Fleet Indexing.
      Role: !GetAtt CleanStackRole.Arn
      Runtime: python3.12
      Handler: aws_admin.clean_stack.lambda_handler
      MemorySize: 128
      Timeout: 300
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key

  StackParameterAwsCleanStackFunctionName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /txing/stack/AwsCleanStackFunctionName
      Type: String
      Value: !Ref CleanStackFunction

  StackParameterAwsCleanStackFunctionArn:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /txing/stack/AwsCleanStackFunctionArn
      Type: String
      Value: !GetAtt CleanStackFunction.Arn

Outputs:
  CleanStackFunctionName:
    Value: !Ref CleanStackFunction
  CleanStackFunctionArn:
    Value: !GetAtt CleanStackFunction.Arn
