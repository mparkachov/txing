AWSTemplateFormatVersion: "2010-09-09"
Description: txing registry enlistment Lambda stack.

Parameters:
  EnvironmentStackName:
    Type: String
    Description: Base txing environment stack name, for example town.
  AwsAdminCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged AWS admin Lambda code.
  AwsAdminCodeS3Key:
    Type: String
    Description: S3 key containing the packaged AWS admin Lambda code.

Resources:
  EnlistLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${EnvironmentStackName}-aws-enlist-txing
      RetentionInDays: 14

  EnlistRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentStackName}-aws-enlist
      Description: Executes txing town, rig, and device enlistment.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: txing-enlist
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EnlistLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt EnlistLogGroup.Arn
                  - !Sub ${EnlistLogGroup.Arn}:*
              - Sid: EnlistThingRegistryWrite
                Effect: Allow
                Action:
                  - iot:CreateThing
                  - iot:DescribeThing
                  - iot:DeleteThing
                  - iot:UpdateThing
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: EnlistThingPrincipalCleanup
                Effect: Allow
                Action:
                  - iot:DetachThingPrincipal
                  - iot:ListThingPrincipals
                Resource: "*"
              - Sid: EnlistRigTypeThingGroups
                Effect: Allow
                Action:
                  - iot:CreateThingGroup
                  - iot:DescribeThingGroup
                  - iot:AddThingToThingGroup
                  - iot:RemoveThingFromThingGroup
                  - iot:ListThingGroupsForThing
                Resource: "*"
              - Sid: EnlistFleetRegistryRead
                Effect: Allow
                Action:
                  - iot:GetIndexingConfiguration
                  - iot:SearchIndex
                Resource: "*"
              - Sid: EnlistThingShadowWrite
                Effect: Allow
                Action:
                  - iot:DeleteThingShadow
                  - iot:GetThingShadow
                  - iot:UpdateThingShadow
                Resource: !Sub arn:${AWS::Partition}:iot:${AWS::Region}:${AWS::AccountId}:thing/*
              - Sid: EnlistTypeCatalogRead
                Effect: Allow
                Action: ssm:GetParametersByPath
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/txing/*
              - Sid: EnlistDescribeEndpoint
                Effect: Allow
                Action: iot:DescribeEndpoint
                Resource: "*"
              - Sid: EnlistBoardVideoChannels
                Effect: Allow
                Action:
                  - kinesisvideo:CreateSignalingChannel
                  - kinesisvideo:DescribeSignalingChannel
                Resource: "*"

  EnlistFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - EnlistLogGroup
    Properties:
      FunctionName: !Sub ${EnvironmentStackName}-aws-enlist-txing
      Description: Enlists txing towns, rigs, devices, and assignments.
      Runtime: python3.12
      Handler: aws_admin.enlist_txing.lambda_handler
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key
      Role: !GetAtt EnlistRole.Arn
      Timeout: 60
      MemorySize: 128

Outputs:
  EnlistFunctionName:
    Value: !Ref EnlistFunction
  EnlistFunctionArn:
    Value: !GetAtt EnlistFunction.Arn
