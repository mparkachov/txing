AWSTemplateFormatVersion: "2010-09-09"
Description: txing release publisher Lambda stack.

Parameters:
  EnvironmentStackName:
    Type: String
    Description: Base txing environment stack name, for example town.
  AwsAdminCodeS3Bucket:
    Type: String
    Description: S3 bucket containing the packaged AWS admin Lambda code.
  AwsAdminCodeS3Key:
    Type: String
    Description: S3 key containing the packaged AWS admin Lambda code.
  LambdaArtifactsBucketName:
    Type: String
    Description: S3 bucket containing release-built Lambda bootstrap zip artifacts.
  GithubRepository:
    Type: String
    Default: mparkachov/txing
    AllowedPattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
    Description: Public GitHub repository containing txing release assets.

Resources:
  PublishReleaseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${EnvironmentStackName}-aws-publish-release
      RetentionInDays: 14

  PublishReleaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentStackName}-aws-publish-release
      Description: Publishes txing release artifacts to Lambda.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: release-publisher
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReleasePublisherLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt PublishReleaseLogGroup.Arn
                  - !Sub ${PublishReleaseLogGroup.Arn}:*
              - Sid: ListLambdaArtifacts
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                Resource: !Sub arn:${AWS::Partition}:s3:::${LambdaArtifactsBucketName}
                Condition:
                  StringLike:
                    s3:prefix:
                      - lambda/*
              - Sid: WriteLambdaArtifacts
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetObject
                  - s3:ListMultipartUploadParts
                  - s3:PutObject
                Resource: !Sub arn:${AWS::Partition}:s3:::${LambdaArtifactsBucketName}/lambda/*
              - Sid: UpdateReleaseLambdas
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:UpdateFunctionCode
                Resource:
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${EnvironmentStackName}-witness
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${EnvironmentStackName}-cloud-rig
                  - !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${EnvironmentStackName}-cloud-mcu

  PublishReleaseFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - PublishReleaseLogGroup
    Properties:
      FunctionName: !Sub ${EnvironmentStackName}-aws-publish-release
      Description: Publishes txing release artifacts to Lambda.
      Runtime: python3.12
      Handler: aws_admin.publish_release.handler.lambda_handler
      Code:
        S3Bucket: !Ref AwsAdminCodeS3Bucket
        S3Key: !Ref AwsAdminCodeS3Key
      Role: !GetAtt PublishReleaseRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          TXING_GITHUB_REPOSITORY: !Ref GithubRepository
          TXING_LAMBDA_ARTIFACT_BUCKET: !Ref LambdaArtifactsBucketName
          TXING_LAMBDA_FUNCTION_PREFIX: !Sub ${EnvironmentStackName}-

Outputs:
  ReleasePublisherFunctionName:
    Value: !Ref PublishReleaseFunction
  ReleasePublisherFunctionArn:
    Value: !GetAtt PublishReleaseFunction.Arn
