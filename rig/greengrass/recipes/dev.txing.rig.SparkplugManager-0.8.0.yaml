RecipeFormatVersion: '2020-01-25'
ComponentName: dev.txing.rig.SparkplugManager
ComponentVersion: '0.8.0'
ComponentType: aws.greengrass.generic
ComponentDescription: txing rig-wide Sparkplug lifecycle manager.
ComponentPublisher: txing
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: '>=0.0.0'
    DependencyType: HARD
ComponentConfiguration:
  DefaultConfiguration:
    AwsRegion: ''
    IotEndpoint: ''
    InventoryIntervalSeconds: 30
    CommandDeadlineMs: 60000
    accessControl:
      aws.greengrass.ipc.pubsub:
        dev.txing.rig.SparkplugManager:pubsub:1:
          policyDescription: Allows the rig-wide Sparkplug manager to exchange v2 capability messages with adapters.
          operations:
            - aws.greengrass#PublishToTopic
            - aws.greengrass#SubscribeToTopic
          resources:
            - dev/txing/rig/v2/*
Manifests:
  - Platform:
      os: linux
      architecture: aarch64
      runtime: aws_nucleus_lite
    Lifecycle:
      run:
        Script: |-
          if [ -n "{configuration:/AwsRegion}" ]; then
            export AWS_REGION="{configuration:/AwsRegion}"
            export AWS_DEFAULT_REGION="{configuration:/AwsRegion}"
          fi
          export AWS_IOT_ENDPOINT="{configuration:/IotEndpoint}"
          exec "{artifacts:path}/txing-sparkplug-manager" --inventory-interval-seconds "{configuration:/InventoryIntervalSeconds}" --command-deadline-ms "{configuration:/CommandDeadlineMs}"
    Artifacts:
      - Uri: s3://REPLACE_WITH_TXING_GREENGRASS_ARTIFACT_BUCKET/sparkplug-manager/0.8.0/txing-sparkplug-manager
        Permission:
          Read: ALL
          Execute: ALL
