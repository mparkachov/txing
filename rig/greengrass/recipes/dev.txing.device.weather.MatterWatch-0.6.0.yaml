RecipeFormatVersion: '2020-01-25'
ComponentName: dev.txing.device.weather.MatterWatch
ComponentVersion: '0.6.0'
ComponentType: aws.greengrass.generic
ComponentDescription: txing observe-only Matter watcher for weather devices.
ComponentPublisher: txing
ComponentConfiguration:
  DefaultConfiguration:
    WeatherThingName: ''
    MatterNodeId: ''
    ChipTool: chip-tool
    SampleIntervalSeconds: 30
    TemperatureEndpoint: 1
    HumidityEndpoint: 2
    PressureEndpoint: 3
    PowerEndpoint: 0
    accessControl:
      aws.greengrass.ipc.pubsub:
        dev.txing.device.weather.MatterWatch:pubsub:1:
          policyDescription: Allows the weather Matter watcher to publish local connectivity state.
          operations:
            - aws.greengrass#PublishToTopic
          resources:
            - dev/txing/rig/v1/connectivity/*
Manifests:
  - Platform:
      os: linux
      architecture: aarch64
      runtime: aws_nucleus_lite
    Lifecycle:
      run:
        Script: |-
          export TXING_DEVICE_TYPE="weather"
          export TXING_DEVICE_DIR="{artifacts:decompressedPath}/rig-greengrass/devices/weather"
          export TXING_DEVICE_MANIFEST="{artifacts:decompressedPath}/rig-greengrass/devices/weather/manifest.toml"
          export WEATHER_THING_NAME="{configuration:/WeatherThingName}"
          export WEATHER_MATTER_NODE_ID="{configuration:/MatterNodeId}"
          if [ -x "{artifacts:decompressedPath}/rig-greengrass/bin/chip-tool" ]; then
            export WEATHER_CHIP_TOOL="{artifacts:decompressedPath}/rig-greengrass/bin/chip-tool"
          else
            export WEATHER_CHIP_TOOL="{configuration:/ChipTool}"
          fi
          export WEATHER_SAMPLE_INTERVAL_SECONDS="{configuration:/SampleIntervalSeconds}"
          export WEATHER_TEMPERATURE_ENDPOINT="{configuration:/TemperatureEndpoint}"
          export WEATHER_HUMIDITY_ENDPOINT="{configuration:/HumidityEndpoint}"
          export WEATHER_PRESSURE_ENDPOINT="{configuration:/PressureEndpoint}"
          export WEATHER_POWER_ENDPOINT="{configuration:/PowerEndpoint}"
          export WEATHER_CHIP_TOOL_STORAGE_DIR="{work:path}/chip-tool-storage"
          export WEATHER_MATTER_WATCH_BINARY="{artifacts:decompressedPath}/rig-greengrass/bin/weather-matter-watch"
          export PYTHONPATH="{artifacts:decompressedPath}/rig-greengrass/python"
          mkdir -p "$WEATHER_CHIP_TOOL_STORAGE_DIR"
          exec python3 -m weather_rig.matter_watch
    Artifacts:
      - Uri: s3://REPLACE_WITH_TXING_GREENGRASS_ARTIFACT_BUCKET/rig-greengrass/0.6.0/rig-greengrass.zip
        Unarchive: ZIP
