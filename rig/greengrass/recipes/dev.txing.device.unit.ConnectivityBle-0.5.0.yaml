RecipeFormatVersion: '2020-01-25'
ComponentName: dev.txing.device.unit.ConnectivityBle
ComponentVersion: '0.5.0'
ComponentType: aws.greengrass.generic
ComponentDescription: txing rig BLE connectivity adapter for MCU rendezvous and GATT power control.
ComponentPublisher: txing
ComponentConfiguration:
  DefaultConfiguration:
    AdapterId: ble-main
    RigId: REPLACE_WITH_RIG_THING_ID
    TownId: REPLACE_WITH_TOWN_THING_ID
    NameFragment: txing
    accessControl:
      aws.greengrass.ipc.pubsub:
        dev.txing.device.unit.ConnectivityBle:pubsub:1:
          policyDescription: Allows the BLE connectivity adapter to exchange local connectivity messages with the Sparkplug manager.
          operations:
            - aws.greengrass#PublishToTopic
            - aws.greengrass#SubscribeToTopic
          resources:
            - dev/txing/rig/v1/connectivity/*
Manifests:
  - Platform:
      os: linux
      architecture: aarch64
      runtime: aws_nucleus_lite
    Lifecycle:
      run:
        RequiresPrivilege: true
        Script: |-
          export RIG_NAME="{configuration:/RigId}"
          export RIG_ID="{configuration:/RigId}"
          export TXING_RIG_ID="{configuration:/RigId}"
          export TXING_TOWN_ID="{configuration:/TownId}"
          export SPARKPLUG_GROUP_ID="{configuration:/TownId}"
          export SPARKPLUG_EDGE_NODE_ID="{configuration:/RigId}"
          export TXING_DEVICE_TYPE="unit"
          export TXING_DEVICE_DIR="{artifacts:decompressedPath}/rig-greengrass/devices/unit"
          export TXING_DEVICE_MANIFEST="{artifacts:decompressedPath}/rig-greengrass/devices/unit/manifest.toml"
          export PYTHONPATH="{artifacts:decompressedPath}/rig-greengrass/python"
          exec python3 -m unit_rig.connectivity_ble --adapter-id "{configuration:/AdapterId}" --name "{configuration:/NameFragment}"
    Artifacts:
      - Uri: s3://REPLACE_WITH_TXING_GREENGRASS_ARTIFACT_BUCKET/rig-greengrass/0.5.0/rig-greengrass.zip
        Unarchive: ZIP
