# Common txing Matter-over-Thread foundation.
CONFIG_CHIP=y
CONFIG_STD_CPP17=y

# Commissioning and radio behavior.
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60
CONFIG_CHIP_ENABLE_ICD_SUPPORT=y

# Common board support used by Nordic's Matter helpers.
CONFIG_DK_LIBRARY=y

# Low-power defaults: application code blocks in the Matter task loop, while
# Zephyr, OpenThread sleepy-end-device mode, and Matter ICD own idle behavior.
CONFIG_PM_DEVICE=y
CONFIG_NCS_SAMPLE_MATTER_WATCHDOG=y

# Matter/Thread stack sizing.
CONFIG_IEEE802154_NRF5_RX_STACK_SIZE=8192
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_BT_RX_STACK_SIZE=1500
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Watch-only txing firmware does not expose interactive shells or OTA in v1.
CONFIG_CHIP_LIB_SHELL=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_CHIP_DFU_OVER_BT_SMP=n
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_SHELL=n
CONFIG_OPENTHREAD_SHELL=n

# Logging and factory data policy.
CONFIG_LOG=y
CONFIG_MATTER_LOG_LEVEL_DBG=y
CONFIG_CHIP_FACTORY_DATA_NONE=y
CONFIG_NCS_SAMPLE_MATTER_DIAGNOSTIC_LOGS=n

# Small-board optimizations.
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
