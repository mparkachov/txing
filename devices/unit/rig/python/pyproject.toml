[project]
name = "unit-rig"
version = "0.3.0"
description = "Unit device-type runtime adapter for the txing rig host"
requires-python = ">=3.12"
dependencies = [
    "awsiotsdk>=1.22,<2",
    "bleak>=0.22,<1",
    "boto3>=1.34,<2",
    "aws",
    "watchtower>=3.3,<4",
]

[build-system]
requires = ["uv_build>=0.10.6,<0.11.0"]
build-backend = "uv_build"

[tool.uv.sources]
aws = { path = "../../../../shared/aws/python" }
