[package]
name = "txing-unit-daemon"
version = "0.9.5"
edition = "2024"
description = "Unit board daemon for txing"

[[bin]]
name = "daemon"
path = "src/main.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-iot = "1"
clap = { version = "4.5", features = ["derive", "env"] }
gneiss-mqtt = { version = "0.5", features = ["tokio-rustls", "tokio-websockets"] }
gneiss-mqtt-aws = { version = "0.5", features = ["tokio-rustls", "tokio-websockets"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
