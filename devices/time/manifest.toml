type = "time"
device_name = "clock"
display_name = "Time"
capabilities = ["sparkplug", "mcp", "time"]
compatible_rig_types = ["cloud"]
redcon_command_levels = [4, 1]

[redcon_rules]
4 = ["sparkplug"]
1 = ["sparkplug", "time", "mcp"]

[shadows.sparkplug]
schema = "aws/sparkplug-shadow.schema.json"
default = "aws/default-sparkplug-shadow.json"

[shadows.mcp]
schema = "aws/mcp-shadow.schema.json"
default = "aws/default-mcp-shadow.json"

[shadows.time]
schema = "aws/time-shadow.schema.json"
default = "aws/default-time-shadow.json"

[web]
adapter = "web/time-adapter.tsx"
