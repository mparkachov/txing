# Logging is compiled out by default for current measurement builds. Re-enable
# LOG/RTT only for focused firmware investigations; it changes the idle image.
CONFIG_LOG=n
CONFIG_CONSOLE=n
CONFIG_BM_UARTE_CONSOLE=n
CONFIG_LOG_BACKEND_BM_UARTE=n
CONFIG_USE_SEGGER_RTT=n

# SoftDevice S115
CONFIG_SOFTDEVICE=y
CONFIG_NRF_SDH_BLE_VS_UUID_COUNT=1
CONFIG_NRF_SDH_BLE_SERVICE_CHANGED=n
CONFIG_NRF_SDH_STR_TABLES=n

# S115 needs the SoftDevice random seed path for reliable BLE startup on
# nRF54L15. Keep this enabled even for open, unencrypted debug GATT.
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_PSA_WANT_GENERATE_RANDOM=y
CONFIG_NRF_SDH_SOC_RAND_SEED=y

# Advertising data encoder.
CONFIG_BLE_ADV=y

# Grove BME280 over XIAO I2C connector.
CONFIG_NRFX_TWIM=y

# XIAO battery divider on AIN7/P1.14 with VBAT switch enable on P1.15.
CONFIG_NRFX_SAADC=y

# The BM XIAO board defconfig enables every nrfx driver for convenience.
# Override that for current measurement builds; the debug app only needs
# CLOCK/POWER/GRTC/SYSTICK/RRAMC plus TWIM and SAADC at runtime.
CONFIG_NRFX_COMP=n
CONFIG_NRFX_EGU10=n
CONFIG_NRFX_EGU20=n
CONFIG_NRFX_GPIOTE20=n
CONFIG_NRFX_GPIOTE30=n
CONFIG_NRFX_GPPI=n
CONFIG_NRFX_I2S=n
CONFIG_NRFX_NFCT=n
CONFIG_NRFX_PDM=n
CONFIG_NRFX_PWM=n
CONFIG_NRFX_QDEC=n
CONFIG_NRFX_SPIM=n
CONFIG_NRFX_TEMP=n
CONFIG_NRFX_TIMER=n
CONFIG_NRFX_UARTE=n
CONFIG_NRFX_WDT=n
