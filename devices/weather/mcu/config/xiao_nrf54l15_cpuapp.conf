# XIAO nRF54L15 weather txing board configuration.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="TxingWeather"

# Grove BME280 on the XIAO I2C connector.
CONFIG_SENSOR=y
CONFIG_BME280=y

# Keep the REDCON 4 firmware small and quiet.
CONFIG_SHELL=n
CONFIG_LOG=n
CONFIG_ASSERT=n
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
