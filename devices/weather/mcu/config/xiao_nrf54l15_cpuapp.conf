# XIAO nRF54L15 weather txing board configuration.
CONFIG_BT_DEVICE_NAME="TxingWeather"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="txing Weather"

# The staged app is derived from NCS's BME680 weather station sample, but this
# txing board uses the Grove BME280.
CONFIG_BME680=n
CONFIG_BME280=y

# XIAO nRF54L15 does not use NFC onboarding hardware.
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# The NCS build uses precompiled OpenThread libraries for this board. Keep
# assert handling aligned with those libraries to avoid a no-effect Kconfig
# divergence warning during Matter configuration.
CONFIG_ASSERT=n

# The weather txing is watch-only after manual commissioning. Drop the
# interactive sample shell and OTA/BT-SMP update paths inherited from the NCS
# demo so the application fits in the XIAO's DTS image slot.
CONFIG_CHIP_LIB_SHELL=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_CHIP_DFU_OVER_BT_SMP=n
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_SHELL=n
CONFIG_OPENTHREAD_SHELL=n

# Keep the same small-board optimizations used by the NCS nRF54L15 weather
# station target.
CONFIG_NCS_SAMPLE_MATTER_DIAGNOSTIC_LOGS=n
CONFIG_NCS_SAMPLE_MATTER_WATCHDOG=y
CONFIG_LTO=y
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
CONFIG_TXING_MATTER_AVERAGE_CURRENT_CONSUMPTION_UA=1000
