# OpenOCD target setup for Seeed XIAO nRF54L15 through its CMSIS-DAP probe.
#
# Homebrew OpenOCD 0.12.0 does not ship an nRF54L target script, so this file
# keeps the small target definition needed to load and verify HEX images.

if {[info exists env(OPENOCD_INTERFACE)]} {
	set INTERFACE $env(OPENOCD_INTERFACE)
} else {
	set INTERFACE "cmsis-dap"
}

source [find interface/$INTERFACE.cfg]

set _CHIPNAME nrf54l

if {[info exists WORKAREASIZE]} {
	set _WORKAREASIZE $WORKAREASIZE
} else {
	set _WORKAREASIZE 0x4000
}

if {[info exists CPUTAPID]} {
	set _CPUTAPID $CPUTAPID
} else {
	set _CPUTAPID 0x6ba02477
}

transport select swd

swd newdap $_CHIPNAME cpu -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap -ap-num 0
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

target create $_CHIPNAME.aux mem_ap -dap $_CHIPNAME.dap -ap-num 1

# AUX-AP is accessible only if CSW Prot[0] bit is set.
$_CHIPNAME.dap apsel 1
$_CHIPNAME.dap apcsw 0x01000000 0x01000000

adapter speed 100
targets $_TARGETNAME

if {![using_hla]} {
	$_TARGETNAME cortex_m reset_config sysresetreq
}

proc txing-nrf54l-load {file} {
	mww 0x5004b500 0x1
	load_image $file
	mww 0x5004b500 0x0
}
