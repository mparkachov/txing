type = "example"
device_name = "example-device"
display_name = "Example Device"
capabilities = ["sparkplug"]
compatible_rig_types = ["example-rig"]

[shadows.sparkplug]
schema = "aws/sparkplug-shadow.schema.json"
default = "aws/default-sparkplug-shadow.json"

[web]
adapter = "web/example-adapter.tsx"

[resources.board_video]
# Omit this table when the device type has no AWS KVS WebRTC sender.
channel_name = "{device_id}-board-video"
