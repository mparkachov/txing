CONFIG_GPIO=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_PRINTK=n
CONFIG_BOOT_BANNER=n

CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_OPENTHREAD_MANUAL_START=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_OPENTHREAD_COAP=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_OPENTHREAD_SRP_CLIENT=y
CONFIG_OPENTHREAD_CRYPTO_PSA=y
# The Zephyr default for OpenThread PSA crypto is 1 KiB.  SRP needs enough
# workspace for P-256 public-key export and deterministic ECDSA signing.
CONFIG_MBEDTLS_HEAP_SIZE=8192
CONFIG_OPENTHREAD_THREAD_STACK_SIZE=8192
CONFIG_OPENTHREAD_NUM_MESSAGE_BUFFERS=64

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS_SECTOR_COUNT=2
CONFIG_SECURE_STORAGE_ITS_MAX_DATA_SIZE=512
CONFIG_CRC=y
CONFIG_JSON_LIBRARY=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
