<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TXING public entrypoint for the connected device office."
    />
    <link rel="icon" type="image/svg+xml" href="/txing-mark.svg" />
    <title>TXING</title>
  </head>
  <body>
    <div id="app">
      <main class="landing-shell">
        <section class="landing-hero" aria-labelledby="landing-title">
          <div class="signal-map" aria-hidden="true">
            <div class="signal-line signal-line-a"></div>
            <div class="signal-line signal-line-b"></div>
            <div class="signal-node signal-node-town"></div>
            <div class="signal-node signal-node-rig"></div>
            <div class="signal-node signal-node-device"></div>
            <div class="signal-frame"></div>
          </div>
          <div class="landing-content">
            <img class="brand-mark" src="/txing-mark.svg" alt="" />
            <p class="eyebrow">TXING</p>
            <h1 id="landing-title">Connected device office</h1>
            <p class="lede">
              Town, rig, and device operations for the current TXING deployment.
            </p>
            <a
              class="signin-link"
              href="https://office.txing.dev/?signin=1"
              data-office-signin
            >
              Sign in
            </a>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
